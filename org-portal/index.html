<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunnyBridge - 机构管理端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    .page-enter { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .scheduled { background: #f3e8ff; color: #7c3aed; }
    .completed { background: #dcfce7; color: #16a34a; }
    .cancelled { background: #f3f4f6; color: #6b7280; }
    .absent { background: #fee2e2; color: #dc2626; }
    .status-label { font-size: 12px; padding: 1px 8px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Login Screen -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50">
  <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="ri-government-line text-3xl text-orange-500"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">SunnyBridge 机构端</h1>
      <p class="text-gray-500 mt-2">请输入机构代码和密码登录</p>
    </div>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">机构代码</label>
        <input type="text" id="login-code" required placeholder="如：sunnybridge"
               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" autofocus>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input type="password" id="login-password" required placeholder="输入密码"
               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <div id="login-error" class="text-red-500 text-sm text-center bg-red-50 rounded-lg py-2 hidden"></div>
      <button type="submit" id="login-btn"
              class="w-full bg-orange-500 text-white py-3 rounded-lg font-medium hover:bg-orange-600 transition-colors flex items-center justify-center gap-2">
        <i class="ri-lock-line"></i> 进入管理
      </button>
    </form>
  </div>
</div>

<!-- Main App Screen (hidden initially) -->
<div id="app-screen" class="hidden">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div id="sidebar" class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0">
      <div class="p-5 border-b border-gray-200">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 bg-orange-100 rounded-lg flex items-center justify-center">
            <i class="ri-government-line text-orange-500 text-lg"></i>
          </div>
          <div>
            <h1 class="font-bold text-gray-800 text-sm" id="sidebar-org-name">加载中...</h1>
            <p class="text-xs text-gray-400">机构管理端</p>
          </div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a href="#" data-page="dashboard" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors bg-orange-50 text-orange-600">
          <i class="ri-dashboard-line"></i> <span>仪表盘</span>
        </a>
        <a href="#" data-page="students" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <i class="ri-user-line"></i> <span>学生管理</span>
        </a>
        <a href="#" data-page="schedule" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <i class="ri-calendar-line"></i> <span>排课管理</span>
        </a>
        <a href="#" data-page="classes" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <i class="ri-time-line"></i> <span>上课记录</span>
        </a>
        <a href="#" data-page="hourspool" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <i class="ri-stack-line"></i> <span>课时池</span>
        </a>
        <a href="#" data-page="settlements" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
          <i class="ri-file-text-line"></i> <span>结算明细</span>
        </a>
      </nav>
      <div class="p-4 border-t border-gray-200">
        <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
          <i class="ri-logout-box-line"></i> <span>退出登录</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto" id="main-content">
      <!-- page content injected here -->
    </div>
  </div>
</div>

<script>
// ── Config ──
const API = 'https://sunnybridge-crm-api.xiwanqin03.workers.dev/api/v1';
const API_KEY = 'xxxxxxxx'; // will use Bearer token after login
let token = '', orgId = '', orgName = '';

// ── Init ──
document.getElementById('login-form').addEventListener('submit', handleLogin);
setupNav();

// ── Login ──
async function handleLogin(e) {
  e.preventDefault();
  const code = document.getElementById('login-code').value.trim();
  const pw = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.classList.add('hidden');
  btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span> 登录中...';
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/org/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({login_code: code, password: pw})
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error?.message || '登录失败'; err.classList.remove('hidden'); btn.innerHTML='<i class="ri-lock-line"></i> 进入管理'; btn.disabled=false; return; }
    token = d.data.token; orgId = String(d.data.org_id); orgName = d.data.name;
    document.getElementById('sidebar-org-name').textContent = orgName;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    showPage('dashboard');
  } catch { err.textContent = '网络错误，请重试'; err.classList.remove('hidden'); btn.innerHTML='<i class="ri-lock-line"></i> 进入管理'; btn.disabled=false; }
}

function logout() {
  token=''; orgId=''; orgName='';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

// ── API helper ──
async function api(endpoint, opts={}) {
  const headers = {'Content-Type':'application/json'};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  // 默认 headers 在前，opts.headers 可覆盖它们（但 orgId/role 不应被覆盖）
  const mergedHeaders = {...headers, ...opts.headers, 'X-Organization-Id': orgId, 'X-User-Role': 'org_admin'};
  const r = await fetch(`${API}${endpoint}`, {...opts, headers: mergedHeaders});
  if (r.status===204) return null;
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || `HTTP ${r.status}`);
  return d;
}

// ── Navigation ──
function setupNav() {
  document.querySelectorAll('.nav-item').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('bg-orange-50','text-orange-600'));
      a.classList.add('bg-orange-50','text-orange-600');
      showPage(a.dataset.page);
    });
  });
}

function showPage(name) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="p-8 text-center text-gray-500">加载中...</div>';
  switch(name) {
    case 'dashboard': renderDashboard(main); break;
    case 'students': renderStudents(main); break;
    case 'schedule': renderSchedule(main); break;
    case 'classes': renderClasses(main); break;
    case 'hourspool': renderHoursPool(main); break;
    case 'settlements': renderSettlements(main); break;
  }
}

// ── Dashboard Page ──
async function renderDashboard(main) {
  try {
    // 并行加载所有数据
    const [pkgRes, stuRes, clsRes, settleRes, allocRes] = await Promise.all([
      api('/org-packages'),
      api('/students', { headers: { 'X-Organization-Id': orgId } }),
      api('/classes', { headers: { 'X-Organization-Id': orgId } }),
      api('/org-settlements'),
      api('/org-packages/allocations')
    ]);

    const packages = pkgRes.data?.data || [];
    const students = stuRes.data?.data || [];
    const allClasses = clsRes.data?.data || [];
    const settlements = settleRes.data?.data || [];
    const allocations = allocRes.data?.data || [];

    // ── 统计计算 ──
    const totalHours = packages.reduce((s,p) => s+(p.total_hours||0), 0);
    const usedHours = packages.reduce((s,p) => s+(p.used_hours||0), 0);
    const remainHours = totalHours - usedHours;
    const studentCount = students.length;

    // 本周课程
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
    const weekClasses = allClasses.filter(c => {
      const d = new Date(c.date); return d >= weekStart && d <= weekEnd;
    });
    const weekCompleted = weekClasses.filter(c => c.status === 'completed').length;
    const weekScheduled = weekClasses.filter(c => c.status === 'scheduled').length;

    // 本月已上课时
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthClasses = allClasses.filter(c => {
      const d = new Date(c.date); return d >= monthStart && c.status === 'completed';
    });
    const monthHours = monthClasses.reduce((s,c) => s+(c.hours||1), 0);

    // 待付款结算
    const pendingSettle = settlements.filter(s => s.status === 'pending');
    const pendingAmount = pendingSettle.reduce((s,x) => s+(x.amount_due_cny||0), 0);

    // 学生课时汇总
    const studentHourMap = {};
    allocations.forEach(a => {
      if (!studentHourMap[a.student_id]) studentHourMap[a.student_id] = { name: a.student_name||'', allocated: 0 };
      studentHourMap[a.student_id].allocated += (a.hours||0);
    });
    students.forEach(s => {
      if (!studentHourMap[s.id]) studentHourMap[s.id] = { name: s.name, allocated: 0 };
      studentHourMap[s.id].used = s.used_hours||0;
      studentHourMap[s.id].remain = (s.total_hours||0) - (s.used_hours||0);
    });

    // 最近上课记录 5条
    const recentClasses = allClasses.sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 5);
    // 最近分配记录 5条
    const recentAllocs = allocations.slice(0, 5);

    // ── 渲染 ──
    const usagePct = totalHours > 0 ? Math.round((usedHours/totalHours)*100) : 0;
    let html = `<div class="p-8 page-enter">

      <!-- 欢迎区 -->
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">${esc(orgName)} 仪表盘</h1>
        <p class="text-gray-500 mt-1">${now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</p>
      </div>

      <!-- 统计卡片 -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <div class="flex items-center justify-between">
            <div><p class="text-sm text-gray-500">总课时</p><p class="text-3xl font-bold mt-1">${totalHours}</p></div>
            <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center"><i class="ri-stack-line text-blue-500 text-xl"></i></div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <div class="flex items-center justify-between">
            <div><p class="text-sm text-gray-500">已用课时</p><p class="text-3xl font-bold text-orange-600 mt-1">${usedHours}</p></div>
            <div class="w-10 h-10 bg-orange-50 rounded-lg flex items-center justify-center"><i class="ri-fire-line text-orange-500 text-xl"></i></div>
          </div>
          <div class="mt-2"><div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-orange-500 h-1.5 rounded-full" style="width:${usagePct}%"></div></div>
          <span class="text-xs text-gray-400 mt-1">${usagePct}% 已消耗</span></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <div class="flex items-center justify-between">
            <div><p class="text-sm text-gray-500">可用课时</p><p class="text-3xl font-bold text-green-600 mt-1">${remainHours}</p></div>
            <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center"><i class="ri-leaf-line text-green-500 text-xl"></i></div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <div class="flex items-center justify-between">
            <div><p class="text-sm text-gray-500">学生人数</p><p class="text-3xl font-bold mt-1">${studentCount}</p></div>
            <div class="w-10 h-10 bg-purple-50 rounded-lg flex items-center justify-center"><i class="ri-user-line text-purple-500 text-xl"></i></div>
          </div>
        </div>
      </div>

      <!-- 本周 + 本月概览 -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <h3 class="text-sm text-gray-500 mb-3"><i class="ri-calendar-week-line mr-1"></i> 本周课程</h3>
          <div class="flex items-center gap-4">
            <div class="text-center"><p class="text-2xl font-bold text-green-600">${weekCompleted}</p><p class="text-xs text-gray-400">已完成</p></div>
            <div class="w-px h-10 bg-gray-200"></div>
            <div class="text-center"><p class="text-2xl font-bold text-purple-600">${weekScheduled}</p><p class="text-xs text-gray-400">已排课</p></div>
            <div class="w-px h-10 bg-gray-200"></div>
            <div class="text-center"><p class="text-2xl font-bold text-gray-600">${weekClasses.length-weekCompleted-weekScheduled}</p><p class="text-xs text-gray-400">取消/缺席</p></div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <h3 class="text-sm text-gray-500 mb-3"><i class="ri-bar-chart-line mr-1"></i> 本月已上课时</h3>
          <p class="text-3xl font-bold text-orange-600">${monthHours} <span class="text-base font-normal text-gray-400">节</span></p>
          <p class="text-xs text-gray-400 mt-1">${monthClasses.length} 节 completed 课程</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-5 border">
          <h3 class="text-sm text-gray-500 mb-3"><i class="ri-wallet-line mr-1"></i> 待付结算</h3>
          ${pendingAmount > 0
            ? `<p class="text-3xl font-bold text-red-500">¥${pendingAmount.toLocaleString()}</p><p class="text-xs text-gray-400 mt-1">${pendingSettle.length} 张待付款结算单</p>`
            : `<p class="text-2xl font-bold text-green-500">已结清</p><p class="text-xs text-gray-400 mt-1">暂无待付结算单</p>`}
        </div>
      </div>

      <!-- 两列：学生课时 + 最近动态 -->
      <div class="grid grid-cols-2 gap-6 mb-6">`;

    // ── 左列：学生课时汇总 ──
    // 先构建学生表格
    let studentTable = '';
    if (studentCount > 0) {
      let rows = '';
      Object.entries(studentHourMap).slice(0,6).forEach(([sid, s]) => {
        const pct = s.remain !== undefined && s.allocated > 0 ? Math.round((s.used/(s.used+s.remain))*100) : 0;
        rows += `<tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3 font-medium">${esc(s.name)}</td>
          <td class="px-6 py-3 text-center text-green-600">+${s.allocated||0}</td>
          <td class="px-6 py-3 text-center text-orange-600">${s.used||0}</td>
          <td class="px-6 py-3 text-center font-medium">${s.remain||0}</td>
          <td class="px-6 py-3 text-center"><div class="w-full bg-gray-200 rounded-full h-2 max-w-[100px] mx-auto"><div class="bg-orange-500 h-2 rounded-full" style="width:${pct}%"></div></div><span class="text-xs text-gray-400">${pct}%</span></td>
        </tr>`;
      });
      studentTable = `<table class="w-full"><thead class="bg-gray-50 border-b"><tr>
        <th class="text-left px-6 py-3 text-sm text-gray-500">学生</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">分配</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">已用</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">剩余</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">使用率</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
    } else {
      studentTable = `<div class="p-8 text-center text-gray-400">暂无学生</div>`;
    }

    html += `<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b">
        <h3 class="font-medium text-gray-800">学生课时</h3>
        <button onclick="navTo('hourspool')" class="text-sm text-orange-500 hover:text-orange-700">分配课时 →</button>
      </div>
      ${studentTable}
      ${studentCount > 6 ? `<div class="px-6 py-3 text-center border-t"><button onclick="navTo('students')" class="text-sm text-orange-500 hover:text-orange-700">查看全部 ${studentCount} 名学生 →</button></div>` : ''}
    </div>`;

    // ── 右列：最近上课记录 ──
    html += `<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b">
        <h3 class="font-medium text-gray-800">最近上课</h3>
        <button onclick="navTo('classes')" class="text-sm text-orange-500 hover:text-orange-700">全部记录 →</button>
      </div>`;
    if (recentClasses.length > 0) {
      const statusMap = {scheduled:'已排课',completed:'已完成',cancelled:'已取消',absent:'缺席'};
      const colorMap = {scheduled:'bg-purple-100 text-purple-700',completed:'bg-green-100 text-green-700',cancelled:'bg-gray-100 text-gray-600',absent:'bg-red-100 text-red-700'};
      html += `<div class="divide-y">`;
      recentClasses.forEach(c => {
        html += `<div class="px-6 py-3 flex items-center justify-between hover:bg-gray-50">
          <div><p class="font-medium text-sm">${esc(c.student_name||'')}</p>
          <p class="text-xs text-gray-400 mt-0.5">${c.date} ${c.start_time||''} · ${esc(c.teacher_name||'')} · ${c.hours||1}节</p></div>
          <span class="status-label ${colorMap[c.status]||''} shrink-0">${statusMap[c.status]||c.status}</span>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="p-8 text-center text-gray-400">暂无上课记录</div>`;
    }
    html += `</div>`;

    html += `</div>`; // end 两列

    <!-- 快捷操作 -->
    html += `<div class="grid grid-cols-4 gap-4">
      <button onclick="navTo('hourspool')" class="bg-white rounded-xl shadow-sm border p-5 text-center hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center mx-auto mb-2"><i class="ri-add-line text-orange-500 text-2xl"></i></div>
        <p class="text-sm font-medium text-gray-700">分配课时</p>
      </button>
      <button onclick="navTo('schedule')" class="bg-white rounded-xl shadow-sm border p-5 text-center hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center mx-auto mb-2"><i class="ri-calendar-add-line text-purple-500 text-2xl"></i></div>
        <p class="text-sm font-medium text-gray-700">排课管理</p>
      </button>
      <button onclick="navTo('students')" class="bg-white rounded-xl shadow-sm border p-5 text-center hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-2"><i class="ri-user-add-line text-blue-500 text-2xl"></i></div>
        <p class="text-sm font-medium text-gray-700">学生管理</p>
      </button>
      <button onclick="navTo('settlements')" class="bg-white rounded-xl shadow-sm border p-5 text-center hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mx-auto mb-2"><i class="ri-file-list-line text-green-500 text-2xl"></i></div>
        <p class="text-sm font-medium text-gray-700">结算明细</p>
      </button>
    </div>`;

    main.innerHTML = html;

  } catch(e) {
    main.innerHTML = `<div class="p-8 text-red-500">加载失败: ${e.message}</div>`;
  }
}

// ── 导航跳转 ──
function navTo(page) {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.remove('bg-orange-50','text-orange-600');
    if (n.dataset.page === page) n.classList.add('bg-orange-50','text-orange-600');
  });
  showPage(page);
}

// ── Students Page ──
async function renderStudents(main) {
  try {
    const d = await api('/students', { headers: { 'X-User-Role': 'org_admin', 'X-Organization-Id': orgId } });
    const students = d.data?.data || [];
    let html = `
      <div class="p-8 page-enter">
        <div class="flex items-center justify-between mb-8">
          <div><h1 class="text-2xl font-bold text-gray-800">学生管理</h1><p class="text-gray-500 mt-1">共 ${students.length} 名学生</p></div>
          <div class="flex gap-3">

function filterStudents(e) {

  });

        <div><label class="block text-sm font-medium mb-1">英文名 *</label><input name="english_name" required value="${esc(s?.english_name||'')}" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500"></div>

        </select></div>

          <button type="button" onclick="closeStudentModal()" class="flex-1 px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600">保存</button>
        </div>

    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector('form').addEventListener('submit', handleStudentSubmit);
}

function closeStudentModal() { document.getElementById('student-modal')?.remove(); }

async function handleStudentSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  // 清理空值避免 PATCH 时触发 validation min 检查
  Object.keys(data).forEach(k => { if (data[k] === '') delete data[k]; });
  data.age = data.age ? parseInt(data.age) : null;
  if (!editingStudentId) data.status = data.status || 'active';
  try {
    if (editingStudentId) {
      await api(`/students/${editingStudentId}`, { method: 'PATCH', body: JSON.stringify(data) });
    } else {
      await api('/students', { method: 'POST', body: JSON.stringify(data) });
    }
    closeStudentModal();
    renderStudents(document.getElementById('main-content'));
  } catch(e) { alert('保存失败: '+e.message); }
}

async function deleteStudent(id, name) {
  if (!confirm(`确定删除「${name}」？`)) return;
  try { await api(`/students/${id}`, { method: 'DELETE' }); renderStudents(document.getElementById('main-content')); }
  catch(e) { alert('删除失败: '+e.message); }
}

function editStudent(s) { showStudentModal(s); }

let _detailData = {}; // { student, classes, payments, hourChanges }
let _detailActiveTab = 'overview';

async function viewStudentDetail(id) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="p-8 text-center text-gray-500">加载中...</div>';
  try {
    const [sRes, clsRes, payRes, hcRes] = await Promise.all([
      api(`/students/${id}`),
      api(`/classes?student_id=${id}&page_size=100`),
      api(`/payments/student/${id}`),
      api(`/hour-changes/student/${id}?page_size=100`).catch(() => ({ data: { data: [] } }))
    ]);
    const s = sRes.data || {};
    const classes = clsRes.data?.data || [];
    const payments = Array.isArray(payRes.data?.data) ? payRes.data.data : (Array.isArray(payRes.data) ? payRes.data : []);
    const hourChanges = hcRes.data?.data || [];
    _detailData = { student: s, classes, payments, hourChanges, id };
    _detailActiveTab = 'overview';
    renderDetailPage();
  } catch(e) {
    main.innerHTML = `<div class="p-8 text-red-500">加载失败: ${e.message}</div>`;
  }
}

  const s = _detailData.student;

        ` : `<div class="text-center py-12 text-gray-400"><p>暂无课时变动记录</p></div>`}

// ── Schedule Page ──
let scheduleData = { teachers: [], students: [], classes: [], orgId: '' };

async function renderSchedule(main) {
  try {
    const [t, s, c] = await Promise.all([
      api('/teachers', { headers: { 'X-Organization-Id': orgId } }),
      api('/students', { headers: { 'X-Organization-Id': orgId } }),
      api('/classes', { headers: { 'X-Organization-Id': orgId } })
    ]);
    scheduleData.teachers = (t.data?.items||t.data?.data||[]).filter(x => x.status==='active');
    scheduleData.students = (s.data?.data||[]).filter(x => x.status==='active');
    scheduleData.classes = c.data?.data||[];
    scheduleData.orgId = orgId;
    const now = new Date();
    main.innerHTML = buildScheduleHTML(now);
    bindScheduleEvents(now);
  } catch(e) { main.innerHTML = `<div class="p-8 text-red-500">加载失败: ${e.message}</div>`; }
}

function buildScheduleHTML(date) {
  const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
  const SLOTS = [];
  for(let h=8; h<=21; h++) {
    SLOTS.push(String(h).padStart(2,'0')+':00');
    if(h<21) SLOTS.push(String(h).padStart(2,'0')+':30');
  }
  let weeks=[];
  for(let w=0;w<2;w++){ let wk=[]; let sw=new Date(date); sw.setDate(sw.getDate()-sw.getDay()+w*7);
    for(let d=0;d<7;d++){ let dt=new Date(sw); dt.setDate(sw.getDate()+d); wk.push(dt); } weeks.push(wk); }

  const fmt = d => d.toISOString().split('T')[0];
  const isToday = d => d.toDateString() === new Date().toDateString();
  const start = weeks[0][0].toLocaleDateString('zh-CN',{month:'long',day:'numeric'});
  const end = weeks[1][6].toLocaleDateString('zh-CN',{month:'long',day:'numeric'});

  let h = `<div class="p-8 page-enter"><div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-gray-900">排课管理</h1>
    <div class="flex items-center gap-2">
      <button onclick="renderSchedule(document.getElementById('main-content'))" class="px-3 py-1.5 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">今天</button>
      <button onclick="shiftWeek(-7)" class="p-2 hover:bg-gray-100 rounded-lg"><i class="ri-arrow-left-s-line text-xl"></i></button>
      <button onclick="shiftWeek(7)" class="p-2 hover:bg-gray-100 rounded-lg"><i class="ri-arrow-right-s-line text-xl"></i></button>
      <span class="text-gray-600 font-medium">${start} - ${end}</span>
    </div></div>
    <div class="bg-white rounded-lg shadow overflow-x-auto"><div class="min-w-[2100px]"><div class="grid grid-cols-[60px_repeat(27,minmax(72px,1fr))] border-b">
    <div class="p-3 text-center text-gray-500 font-medium border-r bg-gray-50">时间</div>`;

  weeks.forEach(wk => wk.forEach(d => {
    h += `<div class="p-2 text-center border-r ${isToday(d)?'bg-orange-50':''}"><div class="text-xs text-gray-500">${DAYS[d.getDay()]}</div><div class="font-semibold text-base ${isToday(d)?'text-orange-600':'text-gray-700'}">${d.getDate()}</div></div>`;
  }));
  h += `</div>`;

  SLOTS.forEach(time => {
    h += `<div class="grid grid-cols-[60px_repeat(27,minmax(72px,1fr))] border-b hover:bg-gray-50"><div class="p-2 text-center text-xs text-gray-600 font-medium border-r bg-gray-50">${time}</div>`;
    weeks.forEach(wk => wk.forEach(d => {
      const dk = fmt(d);
      const items = scheduleData.classes.filter(c => c.date===dk && c.start_time===time && c.status!=='cancelled');
      h += `<div class="min-h-[52px] p-1 border-r cursor-pointer ${isToday(d)?'bg-orange-50/30':''}" onclick="openScheduleModal('${dk}','${time}')">`;
      items.forEach(c => {
        const s = scheduleData.students.find(x=>x.id===c.student_id);
        const t = scheduleData.teachers.find(x=>x.id===c.teacher_id);
        h += `<div class="text-xs p-1 rounded mb-1 ${c.status==='completed'?'completed':c.status==='scheduled'?'scheduled':'cancelled'} relative group" onclick="event.stopPropagation();editClass(${c.id})">
          <div class="font-medium truncate">${s?.name||'未知'}${s?.english_name?` (${esc(s.english_name)})`:''}</div>
          <div class="truncate text-gray-500 text-xs">${esc(c.teacher_name||t?.name||c.teacher||'')}</div>
          <button onclick="event.stopPropagation();deleteClass(${c.id})" class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 p-0.5 bg-red-500 text-white rounded text-[10px]"><i class="ri-close-line"></i></button></div>`;
      });
      h += `</div>`;
    }));
    h += `</div>`;
  });
  h += `</div></div></div></div>`;
  return h;
}

let scheduleWeekOffset = 0;
function shiftWeek(delta) {
  scheduleWeekOffset += delta;
  const d = new Date(); d.setDate(d.getDate() + scheduleWeekOffset);
  document.getElementById('main-content').innerHTML = buildScheduleHTML(d);
  bindScheduleEvents(d);
}

          <input type="hidden" name="date" value="${dk}">
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium mb-1">开始时间 *</label><input type="time" name="start_time" value="${time}" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500"></div>
            <div><label class="block text-sm font-medium mb-1">时长（分钟）</label><select name="duration" class="w-full px-3 py-2 border rounded-lg"><option value="25">25分钟 (0.5课时)</option><option value="50" selected>50分钟 (1课时)</option><option value="60">60分钟</option></select></div>
          </div>

        </form>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector('form').addEventListener('submit', async e => {
      e.preventDefault(); const fd = new FormData(e.target); const data = Object.fromEntries(fd);
      data.student_id = parseInt(data.student_id); data.teacher_id = parseInt(data.teacher_id);
      const duration = parseInt(data.duration) || 50;
      // 时长(分钟) → 课时数：25分钟=0.5课时, 50分钟=1课时, 60分钟=1课时
      data.hours = duration === 25 ? 0.5 : duration === 50 ? 1.0 : duration / 60;

    const modal = document.createElement('div');

        <div><label class="block text-sm font-medium mb-1">状态</label><select name="status" class="w-full px-3 py-2 border rounded-lg"><option value="scheduled" ${c.status==='scheduled'?'selected':''}>已排课</option><option value="completed" ${c.status==='completed'?'selected':''}>已完成</option><option value="cancelled" ${c.status==='cancelled'?'selected':''}>已取消</option></select></div></div>
        <div><label class="block text-sm font-medium mb-1">备注</label><textarea name="notes" rows="2" class="w-full px-3 py-2 border rounded-lg">${esc(c.notes||'')}</textarea></div>
        <div class="flex gap-3 pt-4"><button type="button" onclick="this.closest('.fixed').remove()" class="flex-1 px-4 py-2 border rounded-lg">取消</button><button type="submit" class="flex-1 px-4 py-2 bg-orange-500 text-white rounded-lg">保存</button></div>
      </form></div>`;
    document.body.appendChild(modal);
    modal.querySelector('form').addEventListener('submit', async e => {
      e.preventDefault(); const fd = new FormData(e.target); const data = Object.fromEntries(fd);
      data.student_id = parseInt(data.student_id); data.teacher_id = parseInt(data.teacher_id);
      try { await api(`/classes/${id}`, { method: 'PATCH', body: JSON.stringify(data) }); modal.remove(); renderSchedule(document.getElementById('main-content')); }
      catch(e) { alert('保存失败: '+e.message); }

  window.deleteClass = async id => {

  };

        const style = {pending:'bg-orange-100 text-orange-700',partial_paid:'bg-yellow-100 text-yellow-700',paid:'bg-green-100 text-green-700'};
        const label = {pending:'待付款',partial_paid:'部分付款',paid:'已付清'};
        const remain = (p.total_hours||0)-(p.used_hours||0);
        html += `<tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3">课时包 #${p.id} <span class="text-xs text-gray-400 ml-2">${esc(p.notes||'')}</span></td>
          <td class="px-6 py-3 text-center">${p.total_hours}</td>
          <td class="px-6 py-3 text-center text-orange-600">${p.used_hours}</td>
          <td class="px-6 py-3 text-center font-medium text-green-600">${remain}</td>
          <td class="px-6 py-3 text-center"><span class="status-label ${style[p.status]||''}">${label[p.status]||p.status}</span></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }

    // 学生课时分汇总
    const studentHourMap = {};
    allocations.forEach(a => {
      if (!studentHourMap[a.student_id]) {
        studentHourMap[a.student_id] = { name: a.student_name || `#${a.student_id}`, allocated: 0 };
      }
      studentHourMap[a.student_id].allocated += (a.hours || 0);
    });
    students.forEach(s => {
      if (!studentHourMap[s.id]) {
        studentHourMap[s.id] = { name: s.name, allocated: 0 };
      }
      studentHourMap[s.id].used = s.used_hours || 0;
      studentHourMap[s.id].total = s.total_hours || 0;
      studentHourMap[s.id].remain = (s.total_hours || 0) - (s.used_hours || 0);
    });

    html += `<div class="bg-white rounded-xl shadow-sm border overflow-hidden mb-6">
      <h3 class="px-6 py-3 border-b text-sm font-medium text-gray-500">学生课时分配</h3>
      <table class="w-full"><thead class="bg-gray-50 border-b"><tr>
        <th class="text-left px-6 py-3 text-sm text-gray-500">学生</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">机构分配</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">已用</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">剩余</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">使用率</th>
      </tr></thead><tbody>`;
    Object.entries(studentHourMap).forEach(([sid, s]) => {
      const usage = s.total > 0 ? Math.round((s.used / s.total) * 100) : 0;
      html += `<tr class="border-b hover:bg-gray-50">
        <td class="px-6 py-3 font-medium">${esc(s.name)}</td>
        <td class="px-6 py-3 text-center text-green-600 font-medium">+${s.allocated || 0}</td>
        <td class="px-6 py-3 text-center text-orange-600">${s.used || 0}</td>
        <td class="px-6 py-3 text-center font-medium">${s.remain || 0}</td>
        <td class="px-6 py-3 text-center">
          <div class="w-full bg-gray-200 rounded-full h-2 max-w-[120px] mx-auto">
            <div class="bg-orange-500 h-2 rounded-full" style="width: ${usage}%"></div>
          </div>
          <span class="text-xs text-gray-500 mt-1">${usage}%</span>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

    // 分配流水
    html += `<div class="bg-white rounded-xl shadow-sm border overflow-hidden"><h3 class="px-6 py-3 border-b text-sm font-medium text-gray-500">最近分配记录</h3>`;
    if (allocations.length > 0) {
      html += `<table class="w-full"><thead class="bg-gray-50 border-b"><tr>
        <th class="text-left px-6 py-3 text-sm text-gray-500">学生</th>
        <th class="text-center px-6 py-3 text-sm text-gray-500">课时</th>
        <th class="text-left px-6 py-3 text-sm text-gray-500">备注</th>
        <th class="text-left px-6 py-3 text-sm text-gray-500">日期</th>
      </tr></thead><tbody>`;
      allocations.forEach(a => {
        html += `<tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3 font-medium">${esc(a.student_name||'')}</td>
          <td class="px-6 py-3 text-center ${a.hours>0?'text-green-600':'text-red-600'} font-medium">${a.hours>0?'+':''}${a.hours}</td>
          <td class="px-6 py-3 text-sm text-gray-500">${esc(a.notes||'')}</td>
          <td class="px-6 py-3 text-sm text-gray-500">${a.created_at}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    } else {
      html += `<p class="px-6 py-8 text-center text-gray-400">暂无分配记录</p>`;
    }
    html += `</div></div>`;

    main.innerHTML = html;

    // 存学生数据给 alloc modal 用
    window._portalStudents = students;

  } catch(e) { main.innerHTML = `<div class="p-8 text-red-500">加载失败: ${e.message}</div>`; }
}

// ── Settlements Page ──
async function renderSettlements(main) {
  try {
    const d = await api('/org-settlements');
    const settlements = d.data?.data || [];
    const totalAmt = settlements.reduce((s,x)=>s+(x.amount_due_cny||0), 0);
    const paidAmt = settlements.filter(x=>x.status==='paid').reduce((s,x)=>s+(x.amount_due_cny||0), 0);

    let html = `<div class="p-8 page-enter">
      <div class="mb-6"><h1 class="text-2xl font-bold text-gray-800">结算明细</h1><p class="text-gray-500 mt-1">本机构结算单</p></div>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-5 border text-center">
          <p class="text-sm text-gray-500">应付总额</p><p class="text-2xl font-bold mt-1">¥${totalAmt.toLocaleString()}</p></div>
        <div class="bg-white rounded-xl shadow-sm p-5 border text-center">
          <p class="text-sm text-gray-500">已付总额</p><p class="text-2xl font-bold text-green-600 mt-1">¥${paidAmt.toLocaleString()}</p></div>
      </div>`;

    if (settlements.length > 0) {
      html += `<div class="space-y-3">`;
      settlements.forEach(s => {
        const style = {pending:'bg-yellow-100 text-yellow-700',paid:'bg-green-100 text-green-700'};
        const label = {pending:'待付款',paid:'已付款'};
        html += `<div class="bg-white rounded-xl shadow-sm border p-5">
          <div class="flex items-center justify-between mb-3">
            <div>
              <span class="text-xs text-gray-400">#${s.id}</span>
              <span class="font-medium text-gray-800 ml-2">${s.period_start} ~ ${s.period_end}</span>
            </div>
            <span class="status-label ${style[s.status]||''}">${label[s.status]||s.status}</span>
          </div>
          <div class="grid grid-cols-4 gap-4 text-center text-sm mb-3">
            <div><span class="text-gray-400">课程数</span><p class="font-medium mt-1">${s.total_classes}</p></div>
            <div><span class="text-gray-400">课时数</span><p class="font-medium mt-1">${s.total_hours}</p></div>
            <div><span class="text-gray-400">单价</span><p class="font-medium mt-1">¥${s.unit_price_cny}</p></div>
            <div><span class="text-gray-400">金额</span><p class="font-bold mt-1 text-orange-600">¥${(s.amount_due_cny||0).toLocaleString()}</p></div>
          </div>
          <button onclick="toggleSettleItems('settle-items-${s.id}')" class="text-sm text-orange-500 hover:text-orange-700">
            <i class="ri-arrow-down-s-line"></i> 查看明细
          </button>
          <div id="settle-items-${s.id}" class="hidden mt-3">
            <p class="text-sm text-gray-500 mb-2">明细加载中...</p>
          </div>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="bg-white rounded-xl shadow-sm border p-8 text-center text-gray-400">暂无结算单</div>`;
    }
    html += `</div>`;

    main.innerHTML = html;

    // 存数据给 toggle 用
    window._portalSettlements = settlements;

  } catch(e) { main.innerHTML = `<div class="p-8 text-red-500">加载失败: ${e.message}</div>`; }
}

// ── 分配课时 Modal ──
function showAllocateModal(studentCount) {
  const students = window._portalStudents || [];
  if (!students.length) { alert('请先加载学生数据！'); return; }
  let opts = students.map(s => `<option value="${s.id}">${esc(s.name)} (${esc(s.english_name||'')}) — 剩余 ${s.total_hours} 节</option>`).join('');
  const html = `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" id="alloc-modal">
    <div class="bg-white rounded-xl shadow-xl p-6 w-[440px] max-h-[90vh] overflow-y-auto">
      <h2 class="text-lg font-bold mb-4">分配课时给学生</h2>
      <form id="alloc-form">
        <div class="space-y-3">
          <div><label class="text-sm text-gray-600 block mb-1">选择学生</label>
            <select name="student_id" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">${opts}</select></div>
          <div><label class="text-sm text-gray-600 block mb-1">课时数</label>
            <input name="hours" type="number" min="1" placeholder="如 5" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" required></div>
          <div><label class="text-sm text-gray-600 block mb-1">备注</label>
            <input name="notes" placeholder="如：月初配课" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
        </div>
        <div class="flex gap-2 mt-5">
          <button type="button" onclick="document.getElementById('alloc-modal').remove()" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm">取消</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-orange-500 text-white rounded-lg text-sm hover:bg-orange-600">确认分配</button>
        </div>
      </form>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('alloc-form').addEventListener('submit', async e => {
    e.preventDefault(); const fd = new FormData(e.target);
    try {
      await api('/org-packages/allocate', { method: 'POST', body: JSON.stringify({
        student_id: parseInt(fd.get('student_id')),
        hours: parseFloat(fd.get('hours')),
        notes: fd.get('notes')
      })});
      document.getElementById('alloc-modal').remove();
      renderHoursPool(document.getElementById('main-content'));
    } catch(e) { alert('分配失败: '+e.message); }
  });
}

// ── 展开结算单明细 ──
async function toggleSettleItems(elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!el.classList.contains('hidden')) { el.classList.add('hidden'); return; }
  const sid = parseInt(elId.replace('settle-items-',''));
  try {
    const d = await api(`/org-settlements/${sid}`);
    const items = d.data?.items || [];
    el.innerHTML = items.length > 0 ? `<table class="w-full text-sm mt-2">
      <thead><tr class="border-b"><th class="py-2 text-left text-gray-500">学生</th><th class="py-2 text-left text-gray-500">教师</th><th class="py-2 text-center text-gray-500">日期</th><th class="py-2 text-center text-gray-500">课时</th><th class="py-2 text-right text-gray-500">小计</th></tr></thead>
      <tbody>${items.map(i => `<tr class="border-b">
        <td class="py-2">${esc(i.student_name||'')}</td><td class="py-2">${esc(i.teacher_name||'')}</td>
        <td class="py-2 text-center text-gray-500">${i.class_date}</td><td class="py-2 text-center">${i.hours}</td>
        <td class="py-2 text-right">¥${i.subtotal_cny}</td></tr>`).join('')}</tbody></table>`
      : '<p class="text-sm text-gray-400">无明细数据</p>';
    el.classList.remove('hidden');
  } catch(e) { el.innerHTML = `<p class="text-sm text-red-500">加载失败: ${e.message}</p>`; el.classList.remove('hidden'); }
}

// ── Utils ──
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
