<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunnyBridge 家长端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f97316 0%, #f59e0b 100%);
      min-height: 100vh;
    }
    .student-card {
      transition: all 0.2s ease;
    }
    .student-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
<div id="password-screen" class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
  <div class="text-center mb-6">
    <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-10 h-10 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 4.477 9.246 4 7.5 4S4.168 4.477 3 5.253v13C4.168 17.477 5.754 17 7.5 17s3.332.477 4.5 1.253m0-13C13.168 4.477 14.754 4 16.5 4c1.747 0 3.332.477 4.5 1.253v13C19.832 17.477 18.247 17 16.5 17c-1.746 0-3.332.477-4.5 1.253"></path>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">SunnyBridge 家长端</h1>
    <p class="text-gray-500 mt-2">请输入访问密码</p>
  </div>

  <div class="space-y-4">
    <div>
      <input type="password" id="password-input" placeholder="请输入密码" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" onkeydown="if(event.key==='Enter')checkPassword()">
    </div>
    <div id="password-error" class="hidden text-red-500 text-sm text-center">密码错误，请重试</div>
    <button onclick="checkPassword()" class="w-full py-3 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors">进入</button>
  </div>

  <div class="mt-6 text-center text-sm text-gray-400">
    <p>SunnyBridge English · 家长端</p>
  </div>
</div>

<div id="main-content" class="hidden w-full">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-auto">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-10 h-10 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 4.477 9.246 4 7.5 4S4.168 4.477 3 5.253v13C4.168 17.477 5.754 17 7.5 17s3.332.477 4.5 1.253m0-13C13.168 4.477 14.754 4 16.5 4c1.747 0 3.332.477 4.5 1.253v13C19.832 17.477 18.247 17 16.5 17c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">SunnyBridge 家长端</h1>
      <p class="text-gray-500 mt-2">查看孩子的学习进度与上课记录</p>
    </div>

    <!-- 搜索方式切换 -->
    <div class="flex gap-2 mb-4">
      <button id="btn-name" onclick="switchMode('name')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-orange-500 text-white">
        学生姓名
      </button>
      <button id="btn-phone" onclick="switchMode('phone')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
        手机号
      </button>
    </div>

    <!-- 搜索输入 -->
    <form onsubmit="handleSearch(event)" class="space-y-4">
      <div>
        <input id="search-input" type="text" placeholder="请输入学生姓名或英文名" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" autocomplete="off">
        <p id="search-hint" class="text-xs text-gray-400 mt-1">输入孩子姓名或英文名进行查询</p>
      </div>

      <!-- 错误提示 -->
      <div id="error" class="hidden flex items-center gap-2 text-red-500 text-sm">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <span id="error-text"></span>
      </div>

      <button type="submit" id="search-btn" class="w-full py-3 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors">
        查询
      </button>
    </form>

    <!-- 搜索结果 -->
    <div id="results" class="hidden mt-4 space-y-3">
      <p class="text-sm text-gray-500 mb-2">找到以下学生：</p>
      <div id="student-list" class="space-y-3"></div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-4">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600 mx-auto"></div>
      <p class="text-gray-500 mt-2 text-sm">查询中...</p>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-sm text-gray-400">
      <p>SunnyBridge English · 家长端</p>
    </div>
  </div>

  <script>
    var API_BASE = 'https://api.qsct.dpdns.org/api/v1';
    var API_KEY = 'sunnyb...2024';
    var currentMode = 'name';

    
// Token encryption for parent link
const SALT = 'sunnybridge2024';
const KEY = 'sb_parent_key_v1';

function xorEncode(str, key) {
  let result = '';
  for (let i = 0; i < str.length; i++) {
    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(result);
}

function encodeStudentToken(studentId) {
  const data = SALT + ':' + studentId;
  return xorEncode(data, KEY);
}

function switchMode(mode) {
      currentMode = mode;
      var btnName = document.getElementById('btn-name');
      var btnPhone = document.getElementById('btn-phone');
      var input = document.getElementById('search-input');
      var hint = document.getElementById('search-hint');

      if (mode === 'name') {
        btnName.className = 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-orange-500 text-white';
        btnPhone.className = 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200';
        input.placeholder = '请输入学生姓名';
        hint.textContent = '输入孩子姓名进行查询';
      } else {
        btnPhone.className = 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-orange-500 text-white';
        btnName.className = 'flex-1 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200';
        input.placeholder = '请输入手机号';
        hint.textContent = '输入登记的手机号进行查询';
      }
      input.value = '';
      hideError();
      hideResults();
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error').classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error').classList.add('hidden');
    }

    function hideResults() {
      document.getElementById('results').classList.add('hidden');
    }

    async function apiGet(endpoint) {
      var res = await fetch(API_BASE + endpoint, { headers: { 'X-API-Key': API_KEY } });
      return res.json();
    }

    async function handleSearch(e) {
      e.preventDefault();
      var value = document.getElementById('search-input').value.trim();
      hideError();
      hideResults();

      if (!value) {
        showError('请输入查询内容');
        return;
      }

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('search-btn').disabled = true;

      try {
        var searchParam = currentMode === 'name' ? 'search=' + encodeURIComponent(value) : 'search=' + encodeURIComponent(value);
        var response = await apiGet('/students?page_size=200&' + searchParam);

        // 处理API返回格式
        var students = [];
        if (response.data && response.data.data && Array.isArray(response.data.data)) {
          students = response.data.data;
        } else if (response.data && Array.isArray(response.data)) {
          students = response.data;
        } else if (Array.isArray(response.data)) {
          students = response.data;
        }

        // 如果是手机号搜索，进一步精确匹配
        if (currentMode === 'phone') {
          students = students.filter(function(s) { return s.phone === value; });
        }

        if (students.length === 0) {
          showError('未找到该学生信息，请检查输入是否正确');
        } else if (students.length === 1) {
          // 只有一个结果，直接跳转
          var token = encodeStudentToken(students[0].id);
          window.location.href = './index.html?token=' + token;
        } else {
          // 多个结果，显示列表
          renderStudentList(students);
        }
      } catch (err) {
        console.error('查询失败:', err);
        showError('查询失败，请稍后重试');
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('search-btn').disabled = false;
      }
    }

    function renderStudentList(students) {
      var list = document.getElementById('student-list');
      list.innerHTML = '';

      students.forEach(function(student) {
        var remaining = (student.total_hours || 0) - (student.used_hours || 0);
        var card = document.createElement('a');
        var token = encodeStudentToken(student.id);
        card.href = './index.html?token=' + token;
        card.className = 'student-card block bg-gray-50 rounded-xl p-4 hover:bg-orange-50';
        card.innerHTML = '<div class="flex items-center gap-4">' +
          '<div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center flex-shrink-0">' +
            '<svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
              '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>' +
            '</svg>' +
          '</div>' +
          '<div class="flex-1">' +
            '<h3 class="font-semibold text-gray-900">' + student.name + '</h3>' +
            '<p class="text-sm text-gray-500">剩余 ' + remaining + ' 课时' +
              (student.grade ? ' · ' + student.grade : '') +
            '</p>' +
          '</div>' +
          '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>' +
          '</svg>' +
        '</div>';
        list.appendChild(card);
      });

      document.getElementById('results').classList.remove('hidden');
    }
  </script>
</div>

<!-- Password check script + Cookie auto-login -->
<script>
// Cookie helpers
function setCookie(name, value, days) {
    var expires = "";
    if (days) {
        var date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toUTCString();
    }
    document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax"
}

function getCookie(name) {
    var nameEQ = name + "=";
    var ca = document.cookie.split(';');
    for(var i=0; i < ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) === ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
    }
    return null;
}

function showMainContent() {
    document.getElementById('password-screen').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
}

// Auto-login from cookie on page load
(function checkAutoLogin() {
    var cookieValue = getCookie('parent_auth');
    if (cookieValue) {
        try {
            var expected = btoa(atob('U3VubnlCcmlkZ2UyMDI0'));
            if (cookieValue === expected) {
                showMainContent();
            }
        } catch(e) {}
    }
})();

function checkPassword() {
    var password = document.getElementById('password-input').value;
    // Password: SunnyBridge2024
    var expected = atob('U3VubnlCcmlkZ2UyMDI0');
    if (password === expected) {
        // Save password hash in cookie (7 days)
        setCookie('parent_auth', btoa(expected), 7);
        showMainContent();
    } else {
        document.getElementById('password-error').classList.remove('hidden');
    }
}
</script>
</body>
</html>
