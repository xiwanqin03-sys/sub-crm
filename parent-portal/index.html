<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunnyBridge 家长端 - 学生详情</title>
  <link rel="icon" type="image/webp" href="assets/sunblogo1.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sb-blue: #4B9FE0;
      --sb-blue-light: #6DB9F0;
      --sb-blue-dark: #2E7AC4;
      --sb-accent: #F5A623;
      --sb-accent-dark: #E08C00;
      --sb-orange: #E26B31;
      --sb-orange-light: #F0825C;
      --sb-text: #0b3a53;
      --sb-muted: #6b7f8f;
      --sb-dark: #1C244B;
      --sb-deep: #0F1535;
      --sb-light-blue: #C7EAF0;
      --sb-bg-light: #F7FAFC;
      --sb-bg-warm: #FFFAF5;
      --sb-bg-white: #FFFFFF;
      --sb-green: #2E8B4A;
      --sb-green-light: #E8F8EE;
      --sb-radius: 12px;
      --sb-radius-lg: 24px;
      --sb-radius-xl: 32px;
      --sb-radius-full: 100px;
      --sb-shadow-sm: 0 1px 3px rgba(28,36,75,0.04), 0 1px 2px rgba(28,36,75,0.02);
      --sb-shadow: 0 4px 24px rgba(28,36,75,0.06), 0 1px 4px rgba(28,36,75,0.03);
      --sb-shadow-lg: 0 12px 48px rgba(28,36,75,0.08), 0 4px 12px rgba(28,36,75,0.04);
      --sb-shadow-xl: 0 20px 60px rgba(28,36,75,0.12), 0 8px 20px rgba(28,36,75,0.06);
      --sb-transition: 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      --sb-transition-fast: 0.2s cubic-bezier(0.32, 0.72, 0, 1);
      --sb-transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-serif: 'Noto Serif SC', serif;
      --font-en: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      color: var(--sb-text);
      line-height: 1.7;
      background: var(--sb-bg-light);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== Floating Header ===== */
    .sb-header {
      position: sticky;
      top: 12px;
      z-index: 100;
      max-width: 1040px;
      margin: 12px auto;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-radius: var(--sb-radius-full);
      box-shadow: 0 2px 20px rgba(28,36,75,0.06), 0 0 0 1px rgba(28,36,75,0.05);
      padding: 0 12px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .sb-header__left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sb-header__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sb-accent), var(--sb-orange));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 3px 10px rgba(226,107,49,0.2);
      flex-shrink: 0;
    }
    .sb-header__info h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--sb-dark);
      line-height: 1.3;
    }
    .sb-header__info p {
      font-size: 12px;
      color: var(--sb-muted);
      line-height: 1.3;
    }
    .sb-header__back {
      padding: 8px 16px;
      border-radius: var(--sb-radius-full);
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-blue);
      background: rgba(75,159,224,0.06);
      transition: all var(--sb-transition-fast);
      cursor: pointer;
      border: none;
      font-family: var(--font-sans);
    }
    .sb-header__back:hover {
      background: rgba(75,159,224,0.12);
      color: var(--sb-blue-dark);
    }
    .sb-header__date {
      font-family: var(--font-en);
      font-size: 13px;
      font-weight: 500;
      color: var(--sb-muted);
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ===== Container ===== */
    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ===== Stats Card ===== */
    .stats-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      padding: 36px 32px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 8px 32px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(98,168,229,0.08);
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }
    .stats-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
    }
    .stats-card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: var(--sb-light-blue);
      opacity: 0.06;
      pointer-events: none;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    .stat-block {
      text-align: center;
    }
    .stat-block__label {
      font-size: 13px;
      font-weight: 500;
      color: var(--sb-muted);
      margin-bottom: 8px;
    }
    .stat-block__value {
      font-family: var(--font-en);
      font-size: 36px;
      font-weight: 700;
      color: var(--sb-dark);
      line-height: 1.1;
    }
    .stat-block__value--accent {
      color: var(--sb-accent-dark);
    }
    .stat-block__value--blue {
      color: var(--sb-blue-dark);
    }
    .stat-block__unit {
      font-size: 14px;
      font-weight: 500;
      color: var(--sb-muted);
      margin-left: 4px;
    }

    /* ===== Section ===== */
    .section {
      margin-top: 40px;
    }
    .section__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section__label {
      font-family: var(--font-en);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sb-blue);
      background: rgba(75,159,224,0.08);
      padding: 5px 16px;
      border-radius: var(--sb-radius-full);
    }
    .section__label--accent {
      color: var(--sb-accent-dark);
      background: rgba(245,166,35,0.08);
    }
    .section__title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--sb-dark);
    }
    .section__count {
      font-size: 14px;
      color: var(--sb-muted);
      font-weight: 500;
    }
    .section__icon {
      width: 20px; height: 20px;
      color: var(--sb-accent);
    }
    .section__icon--blue { color: var(--sb-blue); }
    .section__icon--muted { color: var(--sb-muted); }

    /* ===== Today's Class Cards ===== */
    .today-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .class-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-lg);
      padding: 24px 20px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 6px 20px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.05);
      transition: all var(--sb-transition);
      position: relative;
      overflow: hidden;
    }
    .class-card::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: calc(var(--sb-radius-lg) - 3px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
    }
    .class-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 1px 2px rgba(28,36,75,0.06),
        0 12px 36px rgba(28,36,75,0.08),
        inset 0 1px 0 rgba(255,255,255,1);
      border-color: rgba(98,168,229,0.15);
    }
    .class-card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .class-card__time {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-en);
      font-size: 15px;
      font-weight: 600;
      color: var(--sb-dark);
    }
    .class-card__time svg {
      width: 16px; height: 16px;
      color: var(--sb-muted);
    }
    .class-card__body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .class-card__row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .class-card__row svg {
      width: 16px; height: 16px;
      color: var(--sb-muted);
      flex-shrink: 0;
    }
    .class-card__teacher {
      font-weight: 600;
      color: var(--sb-text);
    }
    .class-card__subject {
      color: var(--sb-muted);
    }
    .class-card__link {
      margin-top: 8px;
      padding-top: 14px;
      border-top: 1px solid rgba(28,36,75,0.04);
    }
    .class-card__link-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--sb-muted);
      margin-bottom: 6px;
    }
    .class-card__link-box {
      font-size: 13px;
      color: var(--sb-text);
      background: rgba(75,159,224,0.06);
      padding: 10px 14px;
      border-radius: var(--sb-radius);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .meeting-join-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #4B9FE0, #2E7AC4);
      color: white !important;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(75,159,224,0.25);
    }
    .meeting-join-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(75,159,224,0.35);
      color: white !important;
    }
    .meeting-join-btn:active { transform: translateY(0); }
    .meeting-id-box {
      margin-top: 8px;
      font-size: 13px;
      color: var(--sb-muted);
      padding: 8px 14px;
      background: rgba(28,36,75,0.03);
      border-radius: var(--sb-radius);
    }
    .meeting-id-box strong {
       color: var(--sb-text);
       font-weight: 700;
       letter-spacing: 1px;
     }
    /* ===== Assessment Report Cards ===== */
    .assessment-card {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 18px 20px;
      background: linear-gradient(180deg, #FFFFFF 0%, #FAFCFF 100%);
      border-radius: var(--sb-radius-lg);
      border: 1px solid rgba(28,36,75,0.06);
      box-shadow: 0 1px 3px rgba(28,36,75,0.04);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .assessment-card:hover {
      box-shadow: 0 4px 16px rgba(28,36,75,0.08);
      transform: translateY(-1px);
    }
    .assessment-card__time {
      font-size: 14px;
      font-weight: 600;
      color: var(--sb-blue);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 120px;
    }
    .assessment-card__body {
      flex: 1;
      min-width: 0;
    }
    .assessment-card__title {
      font-weight: 600;
      font-size: 15px;
      color: var(--sb-text);
    }
    .assessment-card__teacher {
      font-size: 13px;
      color: var(--sb-muted);
      margin-top: 2px;
    }
    .assessment-card__message {
      margin-top: 6px;
      font-size: 13px;
      color: #6b7f8f;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .assessment-card__level {
      margin-top: 6px;
    }
    .assessment-card__arrow {
      display: flex;
      align-items: center;
      color: var(--sb-blue);
      font-size: 13px;
      font-weight: 600;
      gap: 2px;
      flex-shrink: 0;
    }

    /* ===== Status Badges ===== */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--sb-radius-full);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-scheduled {
      background: rgba(245,166,35,0.1);
      color: var(--sb-accent-dark);
    }
    .status-completed {
      background: rgba(46,139,74,0.1);
      color: var(--sb-green);
    }
    .status-cancelled {
      background: rgba(107,127,143,0.1);
      color: var(--sb-muted);
    }
    .status-absent {
      background: rgba(220,38,38,0.1);
      color: #DC2626;
    }

    /* ===== Table ===== */
    .table-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 6px 20px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.05);
      position: relative;
    }
    .table-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
      pointer-events: none;
    }
    .sb-table {
      width: 100%;
      border-collapse: collapse;
      position: relative;
      z-index: 1;
    }
    .sb-table thead {
      background: linear-gradient(135deg, var(--sb-blue), #3E8DD1);
    }
    .sb-table thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }
    .sb-table tbody tr {
      border-bottom: 1px solid rgba(28,36,75,0.04);
      transition: background var(--sb-transition-fast);
    }
    .sb-table tbody tr:last-child {
      border-bottom: none;
    }
    .sb-table tbody tr:hover {
      background: rgba(75,159,224,0.03);
    }
    .sb-table td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--sb-text);
    }
    .sb-table .day-of-week {
      color: var(--sb-accent-dark);
      font-weight: 600;
      margin-left: 4px;
    }
    .sb-table .feedback-link {
      color: var(--sb-blue);
      font-weight: 600;
      cursor: pointer;
      transition: color var(--sb-transition-fast);
    }
    .sb-table .feedback-link:hover {
      color: var(--sb-blue-dark);
      text-decoration: underline;
    }
    .sb-table .no-feedback {
      color: #c0ccd6;
      font-size: 13px;
    }

    /* ===== Pagination ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 13px;
      color: var(--sb-muted);
    }
    .pagination__info {
      font-weight: 500;
    }
    .pagination__btns {
      display: flex;
      gap: 8px;
    }
    .page-btn {
      padding: 8px 16px;
      border-radius: var(--sb-radius-full);
      border: 1px solid rgba(28,36,75,0.08);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-text);
      cursor: pointer;
      transition: all var(--sb-transition-fast);
      font-family: var(--font-sans);
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--sb-blue);
      color: var(--sb-blue);
      box-shadow: 0 2px 8px rgba(75,159,224,0.1);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== Empty State ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: var(--sb-muted);
      font-size: 15px;
      background: rgba(255,255,255,0.6);
      border-radius: var(--sb-radius-lg);
    }

    /* ===== Loading ===== */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(245,166,35,0.15);
      border-top: 3px solid var(--sb-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,21,53,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--sb-transition), visibility var(--sb-transition);
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      margin: 16px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.06),
        0 20px 60px rgba(28,36,75,0.15),
        0 8px 20px rgba(28,36,75,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.06);
      position: relative;
      transform: translateY(20px);
      transition: transform var(--sb-transition);
    }
    .modal-overlay.show .modal-card {
      transform: translateY(0);
    }
    .modal-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.06);
      pointer-events: none;
    }
    .modal-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--sb-dark);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-info {
      background: var(--sb-bg-light);
      border-radius: var(--sb-radius);
      padding: 16px 18px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-info__row {
      display: flex;
      font-size: 14px;
      color: var(--sb-text);
      margin-bottom: 6px;
    }
    .modal-info__row:last-child { margin-bottom: 0; }
    .modal-info__row .label {
      font-weight: 600;
      color: var(--sb-dark);
      min-width: 70px;
    }
    .modal-feedback {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .modal-feedback__group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-dark);
      margin-bottom: 8px;
    }
    .modal-feedback__box {
      width: 100%;
      padding: 14px 16px;
      background: var(--sb-bg-light);
      border: 1px solid rgba(28,36,75,0.05);
      border-radius: var(--sb-radius);
      font-size: 14px;
      color: var(--sb-muted);
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 50px;
    }
    .modal-close {
      width: 100%;
      padding: 14px 28px;
      border-radius: var(--sb-radius-full);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--sb-accent), var(--sb-orange));
      color: #fff;
      box-shadow: 0 4px 20px rgba(226,107,49,0.25);
      transition: all var(--sb-transition);
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-close:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(226,107,49,0.35);
    }
    .modal-close:active {
      transform: scale(0.97);
    }

    /* ===== Error State ===== */
    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #DC2626;
      font-size: 15px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .sb-header {
        top: 8px; margin: 8px 12px; height: auto; min-height: 52px;

<script>
// ===== Escape HTML to prevent XSS while preserving whitespace =====
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 全局变量 =====
var API_BASE = 'https://api.qsct.dpdns.org/api/v1';
var API_KEY = '***'; // 同登录页
var STATUS_LABELS = { scheduled: 'Scheduled', completed: 'Completed', cancelled: 'Cancelled', absent: 'Absent' };
var STATUS_CSS = { scheduled: 'status-scheduled', completed: 'status-completed', cancelled: 'status-cancelled', absent: 'status-absent' };

// ===== Simple URL Token Encryption =====
// Token 来源可能有两套加密参数，尝试解码
const SALT_KEY_PAIRS = [
  { salt: 'sunnybridge2024', key: 'sb_parent_key_v1' },
  { salt: 'sunnybridge', key: 'SBridgeParent2024!@' },
];

function tryAllDecode(token, pair) {
  const decoded = xorDecode(token, pair.key);
  if (!decoded) return null;
  const parts = decoded.split(':');
  if (parts.length !== 2 || parts[0] !== pair.salt) return null;
  return parts[1];
}

function decodeStudentToken(token) {
  for (var i = 0; i < SALT_KEY_PAIRS.length; i++) {
    var id = tryAllDecode(token, SALT_KEY_PAIRS[i]);
    if (id) return id;
  }
  return null;
}

function xorEncode(str, key) {
  let result = '';
  for (let i = 0; i < str.length; i++) {
    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(result);
}

function xorDecode(str, key) {
  try {
    let decoded = atob(str);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return result;
  } catch (e) {
    return null;
  }
}

function encodeStudentToken(studentId) {
  // 用第一套参数生成 token
  const data = SALT_KEY_PAIRS[0].salt + ':' + studentId;
  return xorEncode(data, SALT_KEY_PAIRS[0].key);
}

function getStudentId() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (token) {
    var decodedId = decodeStudentToken(token);
    if (decodedId) return decodedId;
  }
  return null;
}

function generateStudentLink(studentId) {
  var token = encodeStudentToken(studentId);
  return window.location.origin + window.location.pathname + '?token=' + token;
}

function formatTime(time) {
  return time ? time.substring(0, 5) : '';
}

function getLocalDate() {
  var d = new Date();
  var year = d.getFullYear();
  var month = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

// ===== API 请求 =====
async function apiGet(endpoint) {
  var res = await fetch(API_BASE + endpoint, { headers: { 'X-API-Key': API_KEY } });
  return res.json();
}

// ===== 主流程 =====
async function loadStudentData() {
  var studentId = getStudentId();
  if (!studentId) {
    window.location.href = './login.html';
    return;
  }

  try {
    var studentResp = await apiGet('/students/' + studentId);
    var student = studentResp.data || studentResp;
    document.getElementById('student-name').textContent = student.name + ' 的学习情况';
    document.getElementById('student-info').textContent = (student.english_name ? '英文名: ' + student.english_name : (student.grade ? '等级: ' + student.grade : ''));

    // Header avatar initials
    var initials = (student.name || 'SB').substring(0, 2);
    document.getElementById('header-avatar').textContent = initials;

    // 获取课程
    var classesResp = await apiGet('/classes?page_size=200');
    var classesData = classesResp.data && classesResp.data.data ? classesResp.data.data
                    : classesResp.data ? classesResp.data
                    : classesResp;
    if (!Array.isArray(classesData)) classesData = [];

    // 按student_id过滤
    classesData = classesData.filter(function(c) {
      return c.student_id === parseInt(studentId);
    });

    // 分类
    var today = getLocalDate();
    var todayClasses = classesData.filter(function(c) { return c.date === today && c.status === 'scheduled'; });
    var upcoming = classesData.filter(function(c) { return c.date > today && c.status === 'scheduled'; });
    var past = classesData.filter(function(c) { return c.date < today || c.status !== 'scheduled'; });

    // 排序
    todayClasses.sort(function(a, b) { return (a.start_time || '').localeCompare(b.start_time || ''); });
    upcoming.sort(function(a, b) { return a.date.localeCompare(b.date); });
    past.sort(function(a, b) { return b.date.localeCompare(a.date); });

    renderTodayClasses(todayClasses);
    renderUpcoming(upcoming.slice(0, 10));
    window_allPastClasses = past;

    // 加载评估报告数据（供成长报告Tab和学习轨迹Tab使用）
    loadAssessments(studentId).then(function() {
      renderStudyProfile(student, classesData);
    });

  } catch (err) {
    console.error('加载失败:', err);
    document.getElementById('today-classes').innerHTML = '<div class="error-state">加载失败: ' + err.message + '</div>';
  }
}

// ===== 解析会议链接信息 =====
function parseMeetingInfo(rawLink) {
  if (!rawLink) return null;
  var info = { raw: rawLink, url: null, meetingId: null, platform: null };

  // 提取 URL (http/https)
  var urlMatch = rawLink.match(/https?:\/\/[^\s<>"']+/);
  if (urlMatch) info.url = urlMatch[0];

  // 判断平台
  if (info.url) {
    if (info.url.indexOf('voovmeeting') >= 0) info.platform = 'VooV Meeting';
    else if (info.url.indexOf('meeting.tencent') >= 0) info.platform = '腾讯会议';
    else if (info.url.indexOf('zoom.us') >= 0) info.platform = 'Zoom';
    else if (info.url.indexOf('teams.microsoft') >= 0) info.platform = 'Teams';
    else if (info.url.indexOf('google.com/meet') >= 0) info.platform = 'Google Meet';
    else info.platform = '会议';
  }

  // 提取会议号 (TencentMeeting：799-056-916 / #TencentMeeting：799-056-916)
  var idMatch = rawLink.match(/(?:#?TencentMeeting[：:]\s*)([\d-]+)/i);
  if (!idMatch) {
    idMatch = rawLink.match(/(?:会议号|Meeting ?ID)[：:]\s*([\d-]+)/i);
  }
  if (idMatch) info.meetingId = idMatch[1];

  return info;
}

function buildMeetingHTML(c) {
  if (!c.class_link) return '';
  var info = parseMeetingInfo(c.class_link);
  if (!info) return '';
  var html = '<div class="class-card__link">';
  html += '<span class="class-card__link-label">📱 上课信息</span>';
  if (info.url) {
    html += '<a href="' + escapeHtml(info.url) + '" target="_blank" rel="noopener" class="meeting-join-btn">';
    html += '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>';
    html += '加入' + escapeHtml(info.platform || '会议');
    html += '</a>';
  }
  if (info.meetingId) {
    html += '<div class="meeting-id-box">会议号：<strong>' + escapeHtml(info.meetingId) + '</strong></div>';
  }
  // 如果没有提取到 URL 也没有会议号，直接显示原始文本
  if (!info.url && !info.meetingId) {
    html += '<div class="class-card__link-box">' + escapeHtml(c.class_link) + '</div>';
  }
  html += '</div>';
  return html;
}

// Load html2canvas lazily
var spH2cLoading = false;
function spLoadH2c() {
  if (window.html2canvas || spH2cLoading) return Promise.resolve();
  spH2cLoading = true;
  return new Promise(function(resolve) {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.2/html2canvas.min.js';
    s.onload = function() { resolve(); };
    s.onerror = function() { spH2cLoading = false; resolve(); };
    document.head.appendChild(s);
  });
}

function spShareCard(btn) {
  var card = btn.closest('.sp-card');
  if (!card) return;
  var orig = card.querySelector('.sp-share-btn');
  if (orig) orig.style.display = 'none';
  // Create a wrapper with brand info
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'padding:16px;background:#F7FAFC;border-radius:16px;';
  var brand = document.createElement('div');
  brand.style.cssText = 'text-align:center;padding:12px 0 4px;font-size:13px;color:#4B9FE0;font-weight:600;';
  brand.textContent = 'SunnyBridge 阳光桥在线英语';
  wrapper.appendChild(card.cloneNode(true));
  wrapper.appendChild(brand);
  document.body.appendChild(wrapper);

  spLoadH2c().then(function() {
    if (!window.html2canvas) { alert('截图功能加载失败，请稍后重试'); cleanup(); return; }
    html2canvas(wrapper, { scale: 2, backgroundColor: '#F7FAFC', useCORS: true }).then(function(canvas) {
      var img = canvas.toDataURL('image/png');
      document.getElementById('sp-share-img').src = img;
      document.getElementById('sp-share-result').classList.add('show');
      cleanup();
    }).catch(function() { alert('截图失败，请稍后重试'); cleanup(); });
  });

  function cleanup() {
    if (orig) orig.style.display = '';
    wrapper.remove();
  }
}

function spCountVocab(classes) {
  var words = {};
  classes.forEach(function(c) {
    if (c.fb_vocab) {
      c.fb_vocab.split(/[,;，；、\n]/).forEach(function(w) {
        var w2 = w.trim();
        if (w2) words[w2] = true;
      });
    }
  });
  return Object.keys(words).length;
}

function renderStudyProfile(student, allClasses) {
  if (!student) return;
  var myClasses = (allClasses || []).filter(function(c) {
    return c.student_id === parseInt(getStudentId());
  });

  // === Info Card ===
  var initials = (student.name || 'SB').substring(0, 2);
  document.getElementById('sp-avatar').textContent = initials;
  document.getElementById('sp-name').textContent = student.name || '-';
  var subInfo = [];
  if (student.english_name) subInfo.push('英文名: ' + student.english_name);
  if (student.age) subInfo.push('年龄: ' + student.age);
  if (student.grade) subInfo.push('等级: ' + student.grade);
  document.getElementById('sp-subinfo').textContent = subInfo.join(' · ');

  // Recent teacher
  var recentTeacher = '';
  var completed = myClasses.filter(function(c) { return c.status === 'completed' || c.teacher_name; });
  completed.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
  if (completed.length > 0 && completed[0].teacher_name) {
    recentTeacher = completed[0].teacher_name;
  } else if (completed.length > 0 && completed[0].teacher) {
    recentTeacher = completed[0].teacher;
  }
  document.getElementById('sp-teacher').textContent = recentTeacher || '-';

  // Level
  document.getElementById('sp-level').textContent = student.grade || '-';

  // Balance
  var remaining = (student.total_hours || 0) - (student.used_hours || 0);
  var balEl = document.getElementById('sp-balance');
  balEl.textContent = remaining.toFixed(1);
  if (remaining < 3) balEl.classList.add('warn');

  // Total lessons (completed)
  var totalLessons = myClasses.filter(function(c) { return c.status === 'completed'; }).length;
  document.getElementById('sp-total-lessons').textContent = totalLessons;

  // Vocab count
  var vocabCount = spCountVocab(myClasses);
  var vcEl = document.getElementById('sp-vocab-count');
  if (vcEl) vcEl.textContent = vocabCount;

  // === Tab: 上课记录 (replaces old History section + feedback) ===

    return c.date < getLocalDate() || c.status !== 'scheduled';
  });

  // Group by month
  var monthGroups = {};

                  c.fb_pronunciation_errors || c.fb_grammar_errors ||
                  c.fb_homework || c.fb_teacher_message || c.fb_next_preview ||
                  c.content || c.homework;
      var isTrialWithReport = c.is_trial === 1 && window_allAssessments && window_allAssessments.some(function(a) { return parseInt(a.class_id) === parseInt(c.id); });

      // Status badge

      histHtml += '<div style="margin-bottom:6px;"><span style="font-size:12px;color:var(--sb-muted);">' + (statusLabels[c.status] || c.status) + '</span></div>';

      // Feedback preview (compact)

          histHtml += '<div style="margin-bottom:4px;"><span class="sp-level-badge">' + (c.fb_lesson_level || '') + ' · Unit ' + (c.fb_unit || '-') + ' / Lesson ' + (c.fb_lesson || '-') + '</span></div>';
        }

        if (c.fb_patterns) histHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">💬 句型</div><div class="sp-feedback-text">' + spEsc(c.fb_patterns) + '</div></div>';
        // 发音纠正

          try {
            var pErrs = JSON.parse(c.fb_pronunciation_errors);
            if (pErrs.length) {
              histHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">🗣️ 发音纠正</div><div class="sp-feedback-text">';

              histHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">📝 语法纠正</div><div class="sp-feedback-text">';

    level_up: { icon: '🎓', label: '升级恭喜报告', color: '#F5A623' }
  };

  var rpHtml = '';
  if (assessments.length === 0 && progressReports.length === 0) {
    rpHtml = '<div class="sp-card" style="text-align:center;color:var(--sb-muted);">暂无成长报告</div>';
  }

  // 先显示阶段报告（更重要的放前面）
  progressReports.forEach(function(r) {
    var typeInfo = REPORT_TYPE_INFO[r.report_type] || { icon: '📋', label: '阶段报告', color: '#6366F1' };
    rpHtml += '<div class="sp-card" style="border-left:3px solid ' + typeInfo.color + ';">';
    rpHtml += '<button class="sp-share-btn" onclick="spShareCard(this)">📸分享</button>';
    rpHtml += '<div style="margin-bottom:8px;"><span style="font-size:16px;">' + typeInfo.icon + '</span> <span style="font-size:13px;font-weight:700;color:' + typeInfo.color + ';">' + typeInfo.label + '</span></div>';
    rpHtml += '<div class="sp-card-header"><span class="sp-card-date">' + ((r.created_at || '').substring(0, 10)) + '</span>';
    rpHtml += '<span class="sp-card-teacher">' + (r.teacher_name || '-') + '</span></div>';
    if (r.report_type === 'level_up' && r.from_level && r.to_level) {
      rpHtml += '<div style="margin:6px 0;"><span class="sp-level-badge">🎓 等级提升: ' + spEsc(r.from_level) + ' → ' + spEsc(r.to_level) + '</span></div>';
    }
    if (r.summary) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">📝 老师总评</div><div class="sp-feedback-text">' + spEsc(r.summary) + '</div></div>';
    if (r.strengths) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">💪 亮点</div><div class="sp-feedback-text">' + spEsc(r.strengths) + '</div></div>';
    if (r.improvements) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">📈 需提升</div><div class="sp-feedback-text">' + spEsc(r.improvements) + '</div></div>';
    if (r.recommendation) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">🎯 下阶段建议</div><div class="sp-feedback-text">' + spEsc(r.recommendation) + '</div></div>';
    if (r.teacher_message) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">💌 老师寄语</div><div class="sp-feedback-text" style="background:rgba(75,159,224,0.06);padding:8px 10px;border-radius:8px;">' + spEsc(r.teacher_message) + '</div></div>';
    rpHtml += '</div>';
  });

  // 再显示体验课评估
  assessments.forEach(function(a) {
    rpHtml += '<div class="sp-card">';
    rpHtml += '<button class="sp-share-btn" onclick="spShareCard(this)">📸分享</button>';
    var cls = myClasses.find(function(c) { return parseInt(c.id) === parseInt(a.class_id); });
    rpHtml += '<div class="sp-card-header"><span class="sp-card-date">' + (cls ? cls.date : (a.created_at || '').substring(0, 10)) + '</span>';
    rpHtml += '<span class="sp-card-teacher">' + (cls ? (cls.teacher_name || '-') : '-') + '</span></div>';
    var dims = [
      ['speaking_pronunciation', '发音清晰度'],
      ['speaking_communication', '开口主动性'],
      ['listening_conversation', '听懂指令'],
      ['listening_key_info', '课堂反应'],
      ['classroom_focus', '专注度'],
      ['classroom_interaction', '互动']
    ];
    dims.forEach(function(d) {
      if (a[d[0]]) {
        rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">' + d[1] + '</div>' + spStarsHtml(a[d[0]]) + '</div>';
      }
    });
    if (a.recommended_level) rpHtml += '<div style="margin:6px 0;"><span class="sp-level-badge">🎓 建议级别: ' + spEsc(a.recommended_level) + '</span></div>';
    if (a.strengths) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">💪 亮点</div><div class="sp-feedback-text">' + spEsc(a.strengths) + '</div></div>';
    if (a.improvements) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">📈 建议提升</div><div class="sp-feedback-text">' + spEsc(a.improvements) + '</div></div>';
    if (a.teacher_message) rpHtml += '<div class="sp-feedback-group"><div class="sp-feedback-label">💌 老师寄语</div><div class="sp-feedback-text" style="background:rgba(75,159,224,0.06);padding:8px 10px;border-radius:8px;">' + spEsc(a.teacher_message) + '</div></div>';
    rpHtml += '</div>';
  });
  document.getElementById('sp-reports-list').innerHTML = rpHtml;

  // === Tab: 学习轨迹 (only milestones) ===
  var milestones = [];

  // Collect all classes sorted oldest first
  var sortedClasses = myClasses.slice().sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });

  // 1. First trial class
  var firstTrial = sortedClasses.find(function(c) { return c.is_trial === 1; });
  if (firstTrial) {
    milestones.push({ date: firstTrial.date, icon: '🎁', title: '首次体验课', desc: '开启英语学习之旅 · ' + (firstTrial.teacher_name || '未知老师'), level: 'milestone' });
  }

  // 2. First regular lesson
  var firstLesson = sortedClasses.find(function(c) { return c.is_trial !== 1 && c.status === 'completed'; });
  if (firstLesson) {
    milestones.push({ date: firstLesson.date, icon: '📖', title: '首次正式课', desc: '正式开始系统学习 · ' + (firstLesson.teacher_name || '未知老师'), level: 'milestone' });
  }

  // 3. Every 10 completed lessons
  var completedCount = 0;
  sortedClasses.forEach(function(c) {
    if (c.is_trial !== 1 && c.status === 'completed') {
      completedCount++;
      if (completedCount % 10 === 0) {
        milestones.push({ date: c.date, icon: '🎒', title: '完成第 ' + completedCount + ' 节课', desc: '坚持学习，稳步进步！', level: 'milestone' });
      }
    }
  });

  // 4. Level changes from assessments
  (window_allAssessments || []).forEach(function(a) {
    if (a.recommended_level) {
      var cls = myClasses.find(function(c) { return parseInt(c.id) === parseInt(a.class_id); });
      var date = cls ? cls.date : (a.created_at || '').substring(0, 10);
      milestones.push({ date: date, icon: '🎓', title: '级别评估', desc: '建议级别: ' + a.recommended_level, level: 'milestone' });
    }
  });

  // 5. Level changes from feedback (fb_lesson_level)
  var seenLevels = {};
  sortedClasses.forEach(function(c) {
    if (c.fb_lesson_level) {
      if (!seenLevels[c.fb_lesson_level]) {
        seenLevels[c.fb_lesson_level] = true;
        milestones.push({ date: c.date, icon: '⬆️', title: '等级记录: ' + c.fb_lesson_level, desc: '老师反馈当前等级', level: 'milestone' });
      }
    }
  });

  // Sort by date
  milestones.sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });

  var tlHtml = '';
  if (milestones.length === 0) {
    tlHtml = '<div class="sp-card" style="text-align:center;color:var(--sb-muted);">暂无学习轨迹</div>';
  }
  milestones.forEach(function(m) {
    tlHtml += '<div class="sp-tl-node milestone">';
    tlHtml += '<div class="sp-tl-date">' + (m.date || '') + '</div>';
    tlHtml += '<div class="sp-tl-title">' + m.icon + ' ' + spEsc(m.title) + '</div>';
    tlHtml += '<div class="sp-tl-desc">' + spEsc(m.desc) + '</div>';
    tlHtml += '</div>';
  });
  document.getElementById('sp-timeline-list').innerHTML = tlHtml;

  // === Renew CTA ===
  var lessonsLeft = Math.floor(remaining);
  var targetMod = totalLessons % 10;
  var lessonsToTarget = 10 - targetMod;
  if (totalLessons === 0) lessonsToTarget = 10;
  document.getElementById('renew-lessons').textContent = lessonsLeft;
  document.getElementById('renew-target').textContent = lessonsToTarget;
}

// ===== Assessment Reports (体验课评估报告) =====
async function loadAssessments(studentId) {
  try {
    var resp = await apiGet('/assessments?student_id=' + studentId + '&status=published&page_size=50');
    var data = resp.data && resp.data.data ? resp.data.data : (resp.data || []);
    window_allAssessments = data;

    // 同时加载阶段报告
    var prResp = await apiGet('/progress-reports?student_id=' + studentId);
    var prData = prResp.data && prResp.data.data ? prResp.data.data : (prResp.data || []);
    window_progressReports = prData;
  } catch(e) { console.error('Assessments load error:', e); }
}

function viewAssessmentReport(assessmentId) {
  var w = window.open('', '_blank', 'width=800,height=900');
  w.document.write('<html><head><meta charset="UTF-8"><title>评估报告</title><style>' + getReportPrintCSS() + '</style></head><body><div style="text-align:center;padding:60px;color:#94a3b8;">加载中...</div></body></html>');
  w.document.close();
  
  apiGet('/assessments/' + assessmentId).then(function(resp) {
    var a = resp.data || resp;
    if (!a || !a.id) { w.document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#94a3b8;">暂无报告</div>'; return; }
    w.document.body.innerHTML = buildReportHTML(a);
  }).catch(function() {
    w.document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#c00;">加载失败</div>';
  });
}

function buildReportHTML(a) {
  function starHTML(val) {
    var h = '<span class="stars-readonly">';
    for (var i = 1; i <= 5; i++) h += '<span class="star ' + (i <= val ? 'active' : '') + '">★</span>';
    return h + '</span>';
  }

  var sName = a.student_name || '';
  var enName = a.student_english_name || '';

  var h = '<div class="report-page">';

  // Header with logo + gradient
  h += '<div class="report-header">';
  h += '<div class="header-top">';
  h += '<div class="brand"><img src="sunblogo.webp" class="brand-logo" alt="SunnyBridge"></div>';
  h += '<div class="header-website">www.sunnybridge.qzz.io</div>';
  h += '</div>';
  h += '<div class="report-title"><h1>体验课评估报告</h1>';
  h += '<div class="subtitle">Trial Class Assessment Report</div></div>';
  h += '</div>';

  // Student Info
  h += '<div class="info-section">';
  h += '<div class="info-item"><div class="info-label">学生姓名 / Student Name</div><div class="info-value">' + escapeHtml(sName) + (enName ? ' (' + escapeHtml(enName) + ')' : '') + '</div></div>';
  h += '<div class="info-item"><div class="info-label">授课教师 / Teacher</div><div class="info-value">' + escapeHtml(a.teacher_name || '-') + '</div></div>';
  h += '<div class="info-item"><div class="info-label">上课日期 / Date & Time</div><div class="info-value">' + (a.class_date || '') + ' ' + formatTime(a.start_time) + '-' + formatTime(a.end_time) + '</div></div>';
  h += '<div class="info-item"><div class="info-label">课程科目 / Subject</div><div class="info-value">' + escapeHtml(a.subject || '英语') + '</div></div>';
  h += '</div>';

  // Dimensions (精简后: 3个维度, 各2项)
  var dims = [
    {icon:'🗣️',title:'口语表现 Speaking Performance',items:[['speaking_pronunciation','发音清晰度'],['speaking_communication','开口意愿']],comments:a.speaking_comments},
    {icon:'🎧',title:'理解能力 Comprehension',items:[['listening_conversation','指令理解'],['listening_key_info','反应速度']],comments:a.listening_comments},
    {icon:'🌟',title:'课堂表现 Classroom Performance',items:[['classroom_focus','专注力'],['classroom_interaction','师生互动']],comments:a.classroom_comments}
  ];

  h += '<div class="dimensions">';
  dims.forEach(function(dim) {
    h += '<div class="dim-card">';
    h += '<div class="dim-header"><span class="dim-icon">' + dim.icon + '</span>' + dim.title + '</div>';
    dim.items.forEach(function(item) {
      var val = a[item[0]] || 0;
      h += '<div class="dim-item"><span class="dim-label">' + item[1] + '</span>' + starHTML(val) + '</div>';
    });
    if (dim.comments) h += '<div class="dim-comments">评语：' + escapeHtml(dim.comments) + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Overall
  h += '<div class="overall-section">';
  h += '<div class="overall-title">📋 综合评估 Overall Assessment</div>';
  if (a.recommended_level) h += '<div class="overall-item"><span class="overall-label">🎓 建议级别 Recommended Level</span><div class="overall-text">' + escapeHtml(a.recommended_level) + '</div></div>';
  if (a.strengths) h += '<div class="overall-item"><span class="overall-label">💪 强项 Strengths</span><div class="overall-text">' + escapeHtml(a.strengths) + '</div></div>';
  if (a.improvements) h += '<div class="overall-item"><span class="overall-label">📈 待提升 Areas to Improve</span><div class="overall-text">' + escapeHtml(a.improvements) + '</div></div>';
  h += '</div>';

  // Teacher Message
  if (a.teacher_message) {
    h += '<div class="message-section"><div class="message-header">💌 教师寄语 Teacher\'s Message</div><div class="message-text">' + escapeHtml(a.teacher_message) + '</div></div>';
  }

  // Footer
  h += '<div class="report-footer">';
  h += '<div class="footer-brand">SunnyBridge 少儿英语</div>';
  h += '<div class="footer-slogan">Bridging Smiles, Building Futures</div>';
  h += '<div class="footer-website">www.sunnybridge.qzz.io</div>';
  h += '<div class="footer-date">' + new Date().toLocaleDateString('zh-CN') + '</div>';
  h += '</div>';

  // Print button
  h += '<div class="print-btn-area"><button class="print-btn" onclick="window.print()">🖨️ 导出 / 打印 PDF</button></div>';

  h += '</div>';
  return h;
}
