<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunnyBridge 家长端 - 学生详情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sb-blue: #4B9FE0;
      --sb-blue-light: #6DB9F0;
      --sb-blue-dark: #2E7AC4;
      --sb-accent: #F5A623;
      --sb-accent-dark: #E08C00;
      --sb-orange: #E26B31;
      --sb-orange-light: #F0825C;
      --sb-text: #0b3a53;
      --sb-muted: #6b7f8f;
      --sb-dark: #1C244B;
      --sb-deep: #0F1535;
      --sb-light-blue: #C7EAF0;
      --sb-bg-light: #F7FAFC;
      --sb-bg-warm: #FFFAF5;
      --sb-bg-white: #FFFFFF;
      --sb-green: #2E8B4A;
      --sb-green-light: #E8F8EE;
      --sb-radius: 12px;
      --sb-radius-lg: 24px;
      --sb-radius-xl: 32px;
      --sb-radius-full: 100px;
      --sb-shadow-sm: 0 1px 3px rgba(28,36,75,0.04), 0 1px 2px rgba(28,36,75,0.02);
      --sb-shadow: 0 4px 24px rgba(28,36,75,0.06), 0 1px 4px rgba(28,36,75,0.03);
      --sb-shadow-lg: 0 12px 48px rgba(28,36,75,0.08), 0 4px 12px rgba(28,36,75,0.04);
      --sb-shadow-xl: 0 20px 60px rgba(28,36,75,0.12), 0 8px 20px rgba(28,36,75,0.06);
      --sb-transition: 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      --sb-transition-fast: 0.2s cubic-bezier(0.32, 0.72, 0, 1);
      --sb-transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-serif: 'Noto Serif SC', serif;
      --font-en: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      color: var(--sb-text);
      line-height: 1.7;
      background: var(--sb-bg-light);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== Floating Header ===== */
    .sb-header {
      position: sticky;
      top: 12px;
      z-index: 100;
      max-width: 1040px;
      margin: 12px auto;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-radius: var(--sb-radius-full);
      box-shadow: 0 2px 20px rgba(28,36,75,0.06), 0 0 0 1px rgba(28,36,75,0.05);
      padding: 0 12px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .sb-header__left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sb-header__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sb-accent), var(--sb-orange));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 3px 10px rgba(226,107,49,0.2);
      flex-shrink: 0;
    }
    .sb-header__info h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--sb-dark);
      line-height: 1.3;
    }
    .sb-header__info p {
      font-size: 12px;
      color: var(--sb-muted);
      line-height: 1.3;
    }
    .sb-header__back {
      padding: 8px 16px;
      border-radius: var(--sb-radius-full);
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-blue);
      background: rgba(75,159,224,0.06);
      transition: all var(--sb-transition-fast);
      cursor: pointer;
      border: none;
      font-family: var(--font-sans);
    }
    .sb-header__back:hover {
      background: rgba(75,159,224,0.12);
      color: var(--sb-blue-dark);
    }

    /* ===== Container ===== */
    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ===== Stats Card ===== */
    .stats-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      padding: 36px 32px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 8px 32px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(98,168,229,0.08);
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }
    .stats-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
    }
    .stats-card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: var(--sb-light-blue);
      opacity: 0.06;
      pointer-events: none;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    .stat-block {
      text-align: center;
    }
    .stat-block__label {
      font-size: 13px;
      font-weight: 500;
      color: var(--sb-muted);
      margin-bottom: 8px;
    }
    .stat-block__value {
      font-family: var(--font-en);
      font-size: 36px;
      font-weight: 700;
      color: var(--sb-dark);
      line-height: 1.1;
    }
    .stat-block__value--accent {
      color: var(--sb-accent-dark);
    }
    .stat-block__value--blue {
      color: var(--sb-blue-dark);
    }
    .stat-block__unit {
      font-size: 14px;
      font-weight: 500;
      color: var(--sb-muted);
      margin-left: 4px;
    }

    /* ===== Section ===== */
    .section {
      margin-top: 40px;
    }
    .section__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section__label {
      font-family: var(--font-en);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sb-blue);
      background: rgba(75,159,224,0.08);
      padding: 5px 16px;
      border-radius: var(--sb-radius-full);
    }
    .section__label--accent {
      color: var(--sb-accent-dark);
      background: rgba(245,166,35,0.08);
    }
    .section__title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--sb-dark);
    }
    .section__count {
      font-size: 14px;
      color: var(--sb-muted);
      font-weight: 500;
    }
    .section__icon {
      width: 20px; height: 20px;
      color: var(--sb-accent);
    }
    .section__icon--blue { color: var(--sb-blue); }
    .section__icon--muted { color: var(--sb-muted); }

    /* ===== Today's Class Cards ===== */
    .today-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .class-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-lg);
      padding: 24px 20px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 6px 20px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.05);
      transition: all var(--sb-transition);
      position: relative;
      overflow: hidden;
    }
    .class-card::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: calc(var(--sb-radius-lg) - 3px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
    }
    .class-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 1px 2px rgba(28,36,75,0.06),
        0 12px 36px rgba(28,36,75,0.08),
        inset 0 1px 0 rgba(255,255,255,1);
      border-color: rgba(98,168,229,0.15);
    }
    .class-card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .class-card__time {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-en);
      font-size: 15px;
      font-weight: 600;
      color: var(--sb-dark);
    }
    .class-card__time svg {
      width: 16px; height: 16px;
      color: var(--sb-muted);
    }
    .class-card__body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .class-card__row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .class-card__row svg {
      width: 16px; height: 16px;
      color: var(--sb-muted);
      flex-shrink: 0;
    }
    .class-card__teacher {
      font-weight: 600;
      color: var(--sb-text);
    }
    .class-card__subject {
      color: var(--sb-muted);
    }
    .class-card__link {
      margin-top: 8px;
      padding-top: 14px;
      border-top: 1px solid rgba(28,36,75,0.04);
    }
    .class-card__link-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--sb-muted);
      margin-bottom: 6px;
    }
    .class-card__link-box {
      font-size: 13px;
      color: var(--sb-text);
      background: rgba(75,159,224,0.06);
      padding: 10px 14px;
      border-radius: var(--sb-radius);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ===== Status Badges ===== */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--sb-radius-full);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-scheduled {
      background: rgba(245,166,35,0.1);
      color: var(--sb-accent-dark);
    }
    .status-completed {
      background: rgba(46,139,74,0.1);
      color: var(--sb-green);
    }
    .status-cancelled {
      background: rgba(107,127,143,0.1);
      color: var(--sb-muted);
    }
    .status-absent {
      background: rgba(220,38,38,0.1);
      color: #DC2626;
    }

    /* ===== Table ===== */
    .table-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.04),
        0 6px 20px rgba(28,36,75,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.05);
      position: relative;
    }
    .table-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.04);
      pointer-events: none;
      pointer-events: none;
    }
    .sb-table {
      width: 100%;
      border-collapse: collapse;
      position: relative;
      z-index: 1;
    }
    .sb-table thead {
      background: linear-gradient(135deg, var(--sb-blue), #3E8DD1);
    }
    .sb-table thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }
    .sb-table tbody tr {
      border-bottom: 1px solid rgba(28,36,75,0.04);
      transition: background var(--sb-transition-fast);
    }
    .sb-table tbody tr:last-child {
      border-bottom: none;
    }
    .sb-table tbody tr:hover {
      background: rgba(75,159,224,0.03);
    }
    .sb-table td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--sb-text);
    }
    .sb-table .day-of-week {
      color: var(--sb-accent-dark);
      font-weight: 600;
      margin-left: 4px;
    }
    .sb-table .feedback-link {
      color: var(--sb-blue);
      font-weight: 600;
      cursor: pointer;
      transition: color var(--sb-transition-fast);
    }
    .sb-table .feedback-link:hover {
      color: var(--sb-blue-dark);
      text-decoration: underline;
    }
    .sb-table .no-feedback {
      color: #c0ccd6;
      font-size: 13px;
    }

    /* ===== Pagination ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 13px;
      color: var(--sb-muted);
    }
    .pagination__info {
      font-weight: 500;
    }
    .pagination__btns {
      display: flex;
      gap: 8px;
    }
    .page-btn {
      padding: 8px 16px;
      border-radius: var(--sb-radius-full);
      border: 1px solid rgba(28,36,75,0.08);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-text);
      cursor: pointer;
      transition: all var(--sb-transition-fast);
      font-family: var(--font-sans);
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--sb-blue);
      color: var(--sb-blue);
      box-shadow: 0 2px 8px rgba(75,159,224,0.1);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== Empty State ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: var(--sb-muted);
      font-size: 15px;
      background: rgba(255,255,255,0.6);
      border-radius: var(--sb-radius-lg);
    }

    /* ===== Loading ===== */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(245,166,35,0.15);
      border-top: 3px solid var(--sb-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,21,53,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--sb-transition), visibility var(--sb-transition);
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F9FBFE 100%);
      border-radius: var(--sb-radius-xl);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      margin: 16px;
      box-shadow:
        0 1px 2px rgba(28,36,75,0.06),
        0 20px 60px rgba(28,36,75,0.15),
        0 8px 20px rgba(28,36,75,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(28,36,75,0.06);
      position: relative;
      transform: translateY(20px);
      transition: transform var(--sb-transition);
    }
    .modal-overlay.show .modal-card {
      transform: translateY(0);
    }
    .modal-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: calc(var(--sb-radius-xl) - 4px);
      border: 1px solid rgba(98,168,229,0.06);
      pointer-events: none;
    }
    .modal-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--sb-dark);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-info {
      background: var(--sb-bg-light);
      border-radius: var(--sb-radius);
      padding: 16px 18px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-info__row {
      display: flex;
      font-size: 14px;
      color: var(--sb-text);
      margin-bottom: 6px;
    }
    .modal-info__row:last-child { margin-bottom: 0; }
    .modal-info__row .label {
      font-weight: 600;
      color: var(--sb-dark);
      min-width: 70px;
    }
    .modal-feedback {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .modal-feedback__group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sb-dark);
      margin-bottom: 8px;
    }
    .modal-feedback__box {
      width: 100%;
      padding: 14px 16px;
      background: var(--sb-bg-light);
      border: 1px solid rgba(28,36,75,0.05);
      border-radius: var(--sb-radius);
      font-size: 14px;
      color: var(--sb-muted);
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 50px;
    }
    .modal-close {
      width: 100%;
      padding: 14px 28px;
      border-radius: var(--sb-radius-full);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--sb-accent), var(--sb-orange));
      color: #fff;
      box-shadow: 0 4px 20px rgba(226,107,49,0.25);
      transition: all var(--sb-transition);
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }
    .modal-close:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(226,107,49,0.35);
    }
    .modal-close:active {
      transform: scale(0.97);
    }

    /* ===== Error State ===== */
    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #DC2626;
      font-size: 15px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .sb-header {
        top: 8px; margin: 8px 12px; height: auto; min-height: 52px;
        padding: 8px 10px 8px 14px; flex-wrap: nowrap;
      }
      .sb-header__avatar { width: 36px; height: 36px; font-size: 13px; }
      .sb-header__info h1 { font-size: 15px; }
      .sb-header__info p { font-size: 11px; }
      .sb-header__back { padding: 6px 12px; font-size: 12px; }

      .container { padding: 0 16px 48px; }

      .stats-card { padding: 28px 20px; border-radius: 24px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
      .stat-block__value { font-size: 28px; }
      .stat-block__label { font-size: 12px; }

      .section { margin-top: 28px; }
      .section__title { font-size: 18px; }
      .section__label { font-size: 10px; letter-spacing: 2px; padding: 4px 12px; }

      .today-grid { grid-template-columns: 1fr; gap: 14px; }
      .class-card { padding: 20px 18px; border-radius: 18px; }

      .table-card { border-radius: 20px; }
      .sb-table thead { display: none; }
      .sb-table, .sb-table tbody, .sb-table tr, .sb-table td { display: block; width: 100%; }
      .sb-table tr {
        border-bottom: 1px solid rgba(28,36,75,0.06);
        padding: 14px 18px;
      }
      .sb-table tbody tr:last-child { border-bottom: none; }
      .sb-table td {
        padding: 4px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
      }
      .sb-table td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--sb-muted);
        font-size: 12px;
        min-width: 50px;
      }
      .sb-table .tooltip-cell { display: none; }

      .pagination { flex-direction: column; gap: 12px; }
      .page-btn { padding: 7px 14px; font-size: 12px; }

      /* Modal */
      .modal-card { padding: 28px 22px; border-radius: 24px; margin: 12px; }
      .modal-title { font-size: 18px; margin-bottom: 18px; }
      .modal-info { padding: 14px 14px; }
      .modal-info__row { font-size: 13px; }
      .modal-feedback__box { font-size: 13px; padding: 12px 14px; }
      .modal-close { padding: 12px 24px; font-size: 14px; }
    }
    @media (max-width: 480px) {
      .sb-header { margin: 6px 8px; padding: 6px 8px 6px 12px; }
      .sb-header__avatar { width: 32px; height: 32px; font-size: 12px; }
      .sb-header__info h1 { font-size: 14px; }
      .sb-header__info p { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
      .sb-header__back { padding: 5px 10px; font-size: 11px; }

      .container { padding: 0 12px 40px; }

      .stats-card { padding: 22px 16px; border-radius: 20px; }
      .stats-grid { gap: 16px; }
      .stat-block__value { font-size: 24px; }
      .stat-block__label { font-size: 11px; }

      .section { margin-top: 24px; }
      .section__header { margin-bottom: 14px; gap: 8px; }
      .section__label { font-size: 9px; letter-spacing: 1.5px; padding: 3px 10px; }
      .section__count { font-size: 12px; }

      .class-card { padding: 18px 14px; border-radius: 16px; }
      .class-card__time { font-size: 14px; }
      .class-card__row { font-size: 13px; }
      .class-card__link-box { font-size: 12px; padding: 8px 12px; }

      .sb-table tr { padding: 12px 14px; }
      .sb-table td { font-size: 13px; }

      .page-btn { padding: 6px 12px; font-size: 11px; }

      .modal-card { padding: 22px 18px; }
      .modal-title { font-size: 17px; }
      .modal-info__row { font-size: 12px; margin-bottom: 4px; }
      .modal-feedback__group label { font-size: 12px; }
      .modal-feedback__box { font-size: 12px; padding: 10px 12px; }
    }
    @media (max-width: 360px) {
      .stats-grid { grid-template-columns: 1fr; gap: 14px; }
      .stat-block { display: flex; align-items: center; justify-content: space-between; }
      .stat-block__label { margin-bottom: 0; }
      .stat-block__value { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- ===== Floating Header ===== -->
<header class="sb-header">
  <div class="sb-header__left">
    <div class="sb-header__avatar" id="header-avatar">SB</div>
    <div class="sb-header__info">
      <h1 id="student-name">Loading...</h1>
      <p id="student-info"></p>
    </div>
  </div>

</header>

<div class="container">
  <!-- ===== Stats Card ===== -->
  <div class="stats-card">
    <div class="stats-grid">
      <div class="stat-block">
        <div class="stat-block__label">剩余课时</div>
        <div class="stat-block__value stat-block__value--accent" id="remaining-hours">-<span class="stat-block__unit"></span></div>
      </div>
      <div class="stat-block">
        <div class="stat-block__label">已用课时</div>
        <div class="stat-block__value" id="used-hours">-</div>
      </div>
      <div class="stat-block">
        <div class="stat-block__label">总课时</div>
        <div class="stat-block__value" id="total-hours">-</div>
      </div>
      <div class="stat-block">
        <div class="stat-block__label">年级</div>
        <div class="stat-block__value stat-block__value--blue" id="grade">-</div>
      </div>
    </div>
  </div>

  <!-- ===== Today's Classes ===== -->
  <section class="section">
    <div class="section__header">
      <span class="section__label section__label--accent">Today's Classes</span>
      <span class="section__count" id="today-count">0</span>
    </div>
    <div id="today-classes" class="today-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading...
      </div>
    </div>
  </section>

  <!-- ===== Upcoming ===== -->
  <section id="upcoming-section" class="section" style="display: none;">
    <div class="section__header">
      <span class="section__label">Upcoming</span>
      <span class="section__count" id="upcoming-count">0</span>
    </div>
    <div class="table-card">
      <table class="sb-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Subject</th>
            <th>Teacher</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="upcoming-body"></tbody>
      </table>
    </div>
  </section>

  <!-- ===== History ===== -->
  <section id="history-section" class="section" style="display: none;">
    <div class="section__header">
      <span class="section__label">History</span>
      <span class="section__count" id="history-count"></span>
    </div>
    <div class="table-card">
      <table class="sb-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Subject</th>
            <th>Teacher</th>
            <th>Feedback</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
    <div id="history-pagination" class="pagination"></div>
  </section>
</div>

<!-- ===== Feedback Modal ===== -->
<div id="feedback-modal" class="modal-overlay">
  <div class="modal-card">
    <h2 class="modal-title">上课反馈详情</h2>

    <div class="modal-info">
      <div class="modal-info__row"><span class="label">日期：</span><span id="feedback-modal-date">-</span></div>
      <div class="modal-info__row"><span class="label">时间：</span><span id="feedback-modal-time">-</span></div>
      <div class="modal-info__row"><span class="label">老师：</span><span id="feedback-modal-teacher">-</span></div>
      <div class="modal-info__row"><span class="label">科目：</span><span id="feedback-modal-subject">-</span></div>
      <div class="modal-info__row"><span class="label">课时：</span><span id="feedback-modal-hours">-</span></div>
    </div>

    <div class="modal-feedback">
      <div class="modal-feedback__group">
        <label>上课内容</label>
        <div class="modal-feedback__box" id="feedback-modal-content">-</div>
      </div>
      <div class="modal-feedback__group">
        <label>作业布置</label>
        <div class="modal-feedback__box" id="feedback-modal-homework">-</div>
      </div>
      <div class="modal-feedback__group">
        <label>备注</label>
        <div class="modal-feedback__box" id="feedback-modal-notes">-</div>
      </div>
    </div>

    <button class="modal-close" onclick="closeFeedbackModal()">关闭</button>
  </div>
</div>

<script>
// ===== Escape HTML to prevent XSS while preserving whitespace =====
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 全局变量 =====
var API_BASE = 'https://api.qsct.dpdns.org/api/v1';
var API_KEY = '***'; // 同登录页
var STATUS_LABELS = { scheduled: 'Scheduled', completed: 'Completed', cancelled: 'Cancelled', absent: 'Absent' };
var STATUS_CSS = { scheduled: 'status-scheduled', completed: 'status-completed', cancelled: 'status-cancelled', absent: 'status-absent' };

// ===== Simple URL Token Encryption =====
const SALT = 'sunnybridge2024';
const KEY = 'sb_parent_key_v1';

function xorEncode(str, key) {
  let result = '';
  for (let i = 0; i < str.length; i++) {
    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(result);
}

function xorDecode(str, key) {
  try {
    let decoded = atob(str);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return result;
  } catch (e) {
    return null;
  }
}

function encodeStudentToken(studentId) {
  const data = SALT + ':' + studentId;
  return xorEncode(data, KEY);
}

function decodeStudentToken(token) {
  const decoded = xorDecode(token, KEY);
  if (!decoded) return null;
  const parts = decoded.split(':');
  if (parts.length !== 2 || parts[0] !== SALT) return null;
  return parts[1];
}

function getStudentId() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (token) {
    var decodedId = decodeStudentToken(token);
    if (decodedId) return decodedId;
  }
  return null;
}

function generateStudentLink(studentId) {
  var token = encodeStudentToken(studentId);
  return window.location.origin + window.location.pathname + '?token=' + token;
}

function formatTime(time) {
  return time ? time.substring(0, 5) : '';
}

function getLocalDate() {
  var d = new Date();
  var year = d.getFullYear();
  var month = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

// ===== API 请求 =====
async function apiGet(endpoint) {
  var res = await fetch(API_BASE + endpoint, { headers: { 'X-API-Key': API_KEY } });
  return res.json();
}

// ===== 主流程 =====
async function loadStudentData() {
  var studentId = getStudentId();
  if (!studentId) {
    window.location.href = './login.html';
    return;
  }

  try {
    var studentResp = await apiGet('/students/' + studentId);
    var student = studentResp.data || studentResp;
    document.getElementById('student-name').textContent = student.name + ' 的学习情况';
    document.getElementById('student-info').textContent = (student.english_name ? '英文名: ' + student.english_name + ' · ' : '') + '年级: ' + (student.grade || '-') + ' · 剩余 ' + ((student.total_hours || 0) - (student.used_hours || 0)) + ' 课时';

    // Header avatar initials
    var initials = (student.name || 'SB').substring(0, 2);
    document.getElementById('header-avatar').textContent = initials;

    // Stats
    document.getElementById('remaining-hours').innerHTML = ((student.total_hours || 0) - (student.used_hours || 0)) + '<span class="stat-block__unit">课时</span>';
    document.getElementById('used-hours').textContent = student.used_hours || 0;
    document.getElementById('total-hours').textContent = student.total_hours || 0;
    document.getElementById('grade').textContent = student.grade || '-';

    // 获取课程
    var classesResp = await apiGet('/classes?page_size=200');
    var classesData = classesResp.data && classesResp.data.data ? classesResp.data.data
                    : classesResp.data ? classesResp.data
                    : classesResp;
    if (!Array.isArray(classesData)) classesData = [];

    // 按student_id过滤
    classesData = classesData.filter(function(c) {
      return c.student_id === parseInt(studentId);
    });

    // 分类
    var today = getLocalDate();
    var todayClasses = classesData.filter(function(c) { return c.date === today && c.status === 'scheduled'; });
    var upcoming = classesData.filter(function(c) { return c.date > today && c.status === 'scheduled'; });
    var past = classesData.filter(function(c) { return c.date < today || c.status !== 'scheduled'; });

    // 排序
    todayClasses.sort(function(a, b) { return (a.start_time || '').localeCompare(b.start_time || ''); });
    upcoming.sort(function(a, b) { return a.date.localeCompare(b.date); });
    past.sort(function(a, b) { return b.date.localeCompare(a.date); });

    renderTodayClasses(todayClasses);
    renderUpcoming(upcoming.slice(0, 10));
    window_allPastClasses = past;
    window_historyPage = 1;
    renderHistory();

  } catch (err) {
    console.error('加载失败:', err);
    document.getElementById('today-classes').innerHTML = '<div class="error-state">加载失败: ' + err.message + '</div>';
  }
}

// ===== 渲染 Today's Classes =====
function renderTodayClasses(classes) {
  document.getElementById('today-count').textContent = classes.length;
  if (classes.length === 0) {
    document.getElementById('today-classes').innerHTML = '<div class="empty-state">今日无课程</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < classes.length; i++) {
    var c = classes[i];
    var statusCss = STATUS_CSS[c.status] || '';
    var statusLabel = STATUS_LABELS[c.status] || c.status;
    html += '<div class="class-card">';
    html += '<div class="class-card__top">';
    html += '<div class="class-card__time"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>' + formatTime(c.start_time) + ' - ' + formatTime(c.end_time) + '</div>';
    html += '<span class="status-badge ' + statusCss + '">' + statusLabel + '</span>';
    html += '</div>';
    html += '<div class="class-card__body">';
    html += '<div class="class-card__row"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="class-card__teacher">' + (c.teacher_name || '未知老师') + '</span></div>';
    html += '<div class="class-card__row"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 4.477 9.246 4 7.5 4S4.168 4.477 3 5.253v13C4.168 17.477 5.754 17 7.5 17s3.332.477 4.5 1.253m0-13C13.168 4.477 14.754 4 16.5 4c1.747 0 3.332.477 4.5 1.253v13C19.832 17.477 18.247 17 16.5 17c-1.746 0-3.332.477-4.5 1.253"></path></svg><span class="class-card__subject">' + (c.subject || '英语') + '</span></div>';
    if (c.class_link) {
      html += '<div class="class-card__link">';
      html += '<span class="class-card__link-label">上课信息</span>';
      html += '<div class="class-card__link-box">' + escapeHtml(c.class_link) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
  }
  document.getElementById('today-classes').innerHTML = html;
}

function getDayOfWeek(dateStr) {
  var days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  var d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()];
}

// ===== 渲染 Upcoming =====
function renderUpcoming(classes) {
  if (classes.length === 0) {
    document.getElementById('upcoming-section').style.display = 'none';
    return;
  }
  document.getElementById('upcoming-count').textContent = classes.length;
  var html = '';
  for (var i = 0; i < classes.length; i++) {
    var c = classes[i];
    var statusCss = STATUS_CSS[c.status] || '';
    var statusLabel = STATUS_LABELS[c.status] || c.status;
    html += '<tr>';
    html += '<td data-label="日期">' + c.date + ' <span class="day-of-week">' + getDayOfWeek(c.date) + '</span></td>';
    html += '<td data-label="时间">' + formatTime(c.start_time) + '</td>';
    html += '<td data-label="科目">' + (c.subject || '英语') + '</td>';
    html += '<td data-label="老师">' + (c.teacher_name || '未知老师') + '</td>';
    html += '<td data-label="状态"><span class="status-badge ' + statusCss + '">' + statusLabel + '</span></td>';
    html += '</tr>';
  }
  document.getElementById('upcoming-body').innerHTML = html;
  document.getElementById('upcoming-section').style.display = '';
}

// ===== 渲染 History =====
function renderHistory() {
  if (typeof window_historyPageSize === 'undefined') window_historyPageSize = 20;
  var all = window_allPastClasses || [];
  if (all.length === 0) {
    document.getElementById('history-section').style.display = 'none';
    return;
  }
  var page = window_historyPage || 1;
  var size = window_historyPageSize || 20;
  var totalPages = Math.ceil(all.length / size);
  if (page > totalPages) page = totalPages;
  if (page < 1) page = 1;
  window_historyPage = page;
  var start = (page - 1) * size;
  var end = start + size;
  var pageData = all.slice(start, end);

  document.getElementById('history-count').textContent = '(' + all.length + ' 条记录)';
  var html = '';
  for (var i = 0; i < pageData.length; i++) {
    var c = pageData[i];
    var globalIdx = start + i;
    html += '<tr>';
    html += '<td data-label="日期">' + c.date + '</td>';
    html += '<td data-label="时间">' + formatTime(c.start_time) + '</td>';
    html += '<td data-label="科目">' + (c.subject || '英语') + '</td>';
    html += '<td data-label="老师">' + (c.teacher_name || '未知老师') + '</td>';
    if (c.status !== 'scheduled') {
      html += '<td data-label="反馈"><a class="feedback-link" onclick="showViewFeedback(' + globalIdx + '); return false;">查看反馈</a></td>';
    } else {
      html += '<td data-label="反馈" class="no-feedback">未提交</td>';
    }
    html += '</tr>';
  }
  document.getElementById('history-body').innerHTML = html;
  document.getElementById('history-section').style.display = '';

  // Pagination
  var pagHtml = '<span class="pagination__info">' + (start + 1) + '-' + Math.min(end, all.length) + ' / ' + all.length + '</span>';
  pagHtml += '<div class="pagination__btns">';
  pagHtml += '<button onclick="goHistoryPage(1)" class="page-btn" ' + (page === 1 ? 'disabled' : '') + '>First</button>';
  pagHtml += '<button onclick="goHistoryPage(' + (page - 1) + ')" class="page-btn" ' + (page === 1 ? 'disabled' : '') + '>Prev</button>';
  pagHtml += '<button onclick="goHistoryPage(' + (page + 1) + ')" class="page-btn" ' + (page >= totalPages ? 'disabled' : '') + '>Next</button>';
  pagHtml += '<button onclick="goHistoryPage(' + totalPages + ')" class="page-btn" ' + (page >= totalPages ? 'disabled' : '') + '>Last</button>';
  pagHtml += '</div>';
  document.getElementById('history-pagination').innerHTML = pagHtml;
}

function goHistoryPage(page) {
  window_historyPage = page;
  renderHistory();
}

// ===== Feedback Modal =====
function showViewFeedback(idx) {
  var cls = window_allPastClasses[idx];
  if (!cls) return;

  document.getElementById('feedback-modal-date').textContent = cls.date || '-';
  document.getElementById('feedback-modal-time').textContent = (cls.start_time ? formatTime(cls.start_time) : '-') + ' - ' + (cls.end_time ? formatTime(cls.end_time) : '-');
  document.getElementById('feedback-modal-teacher').textContent = cls.teacher_name || '-';
  document.getElementById('feedback-modal-subject').textContent = cls.subject || '-';
  document.getElementById('feedback-modal-hours').textContent = (cls.hours || 1) + ' 节';
  document.getElementById('feedback-modal-content').innerHTML = escapeHtml(cls.content) || '无';
  document.getElementById('feedback-modal-homework').innerHTML = escapeHtml(cls.homework) || '无';
  document.getElementById('feedback-modal-notes').innerHTML = escapeHtml(cls.notes) || '无';

  document.getElementById('feedback-modal').classList.add('show');
}

function closeFeedbackModal() {
  document.getElementById('feedback-modal').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('feedback-modal').addEventListener('click', function(e) {
  if (e.target === this) closeFeedbackModal();
});

// ===== 初始化 =====
loadStudentData();
</script>

</body>
</html>
