<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunnyBridge 家长端 - 学生详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .student-card { transition: all 0.2s ease; }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app">
  <!-- 顶部导航 -->
  <div class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
            <i data-lucide="user" class="w-6 h-6 text-orange-600"></i>
          </div>
          <div>
            <h1 id="student-name" class="text-xl font-bold text-gray-900">Loading...</h1>
            <p id="student-info" class="text-sm text-gray-500"></p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 py-6 space-y-6">
    <!-- 学生信息卡片 -->
    <div id="student-card" class="bg-white rounded-lg shadow p-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-center">
        <div>
          <p class="text-sm font-medium text-gray-500">剩余课时</p>
          <p id="remaining-hours" class="text-2xl font-bold text-orange-600">-</p>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-500">已用课时</p>
          <p id="used-hours" class="text-2xl font-bold text-gray-600">-</p>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-500">总课时</p>
          <p id="total-hours" class="text-2xl font-bold text-gray-600">-</p>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-500">年级</p>
          <p id="grade" class="text-2xl font-bold text-gray-600">-</p>
        </div>
      </div>
    </div>

    <!-- Today's Classes -->
    <section>
      <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
        <i data-lucide="calendar" class="w-5 h-5 text-orange-500"></i>
        Today's Classes (<span id="today-count">0</span>)
      </h2>
      <div id="today-classes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full text-center py-8 text-gray-500">
          <div class="spinner mx-auto mb-3"></div>
          Loading...
        </div>
      </div>
    </section>

    <!-- Upcoming -->
    <section id="upcoming-section" class="hidden">
      <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
        <i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i>
        Upcoming (<span id="upcoming-count">0</span>)
      </h2>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Date</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Time</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Subject</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Teacher</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Status</th>
            </tr>
          </thead>
          <tbody id="upcoming-body"></tbody>
        </table>
      </div>
    </section>

    <!-- History -->
    <section id="history-section" class="hidden">
      <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
        <i data-lucide="clock" class="w-5 h-5 text-gray-600"></i>
        History <span id="history-count" class="text-sm font-normal text-gray-500"></span>
      </h2>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Date</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Time</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Subject</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Teacher</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Feedback</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
      <div id="history-pagination" class="flex items-center justify-between mt-3 text-sm text-gray-600"></div>
    </section>
  </div>
</div>

<script>
// ===== Escape HTML to prevent XSS while preserving whitespace =====
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 全局变量 =====
var API_BASE = 'https://api.qsct.dpdns.org/api/v1';
var API_KEY = '***'; // 同登录页
var STATUS_LABELS = { scheduled: 'Scheduled', completed: 'Completed', cancelled: 'Cancelled', absent: 'Absent' };
var STATUS_COLORS = { scheduled: 'bg-yellow-100 text-yellow-800', completed: 'bg-green-100 text-green-800', cancelled: 'bg-gray-100 text-gray-800', absent: 'bg-red-100 text-red-800' };

// ===== 工具函数 =====

// ===== Simple URL Token Encryption =====
// Format: token = base64(xor(student_id + salt, key))
// This is NOT secure, just for URL obfuscation

const SALT = 'sunnybridge2024';
const KEY = 'sb_parent_key_v1';

function xorEncode(str, key) {
  let result = '';
  for (let i = 0; i < str.length; i++) {
    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return btoa(result);
}

function xorDecode(str, key) {
  try {
    let decoded = atob(str);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return result;
  } catch (e) {
    return null;
  }
}

function encodeStudentToken(studentId) {
  const data = SALT + ':' + studentId;
  return xorEncode(data, KEY);
}

function decodeStudentToken(token) {
  const decoded = xorDecode(token, KEY);
  if (!decoded) return null;
  const parts = decoded.split(':');
  if (parts.length !== 2 || parts[0] !== SALT) return null;
  return parts[1];
}

function getStudentId() {
  var params = new URLSearchParams(window.location.search);
  
  // Get encrypted token
  var token = params.get('token');
  if (token) {
    var decodedId = decodeStudentToken(token);
    if (decodedId) return decodedId;
  }
  
  return null;
}

function generateStudentLink(studentId) {
  var token = encodeStudentToken(studentId);
  return window.location.origin + window.location.pathname + '?token=' + token;
}








function formatTime(time) {
  return time ? time.substring(0, 5) : '';
}

function getLocalDate() {
  var d = new Date();
  var year = d.getFullYear();
  var month = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

// ===== API 请求 =====
async function apiGet(endpoint) {
  var res = await fetch(API_BASE + endpoint, { headers: { 'X-API-Key': API_KEY } });
  return res.json();
}

// ===== 主流程 =====
async function loadStudentData() {
  var studentId = getStudentId();
  if (!studentId) {
    window.location.href = './login.html';
    return;
  }

  try {

    // 获取学生信息
    var studentResp = await apiGet('/students/' + studentId);
    var student = studentResp.data || studentResp;
    document.getElementById('student-name').textContent = student.name + ' 的学习情况';
    document.getElementById('student-info').textContent = (student.english_name ? '英文名: ' + student.english_name + ' · ' : '') + '年级: ' + (student.grade || '-') + ' · 剩余 ' + ((student.total_hours || 0) - (student.used_hours || 0)) + ' 课时';

    // 学生卡片详情
    document.getElementById('remaining-hours').textContent = (student.total_hours || 0) - (student.used_hours || 0);
    document.getElementById('used-hours').textContent = student.used_hours || 0;
    document.getElementById('total-hours').textContent = student.total_hours || 0;
    document.getElementById('grade').textContent = student.grade || '-';

    // 获取该学生的所有课程
    var classesResp = await apiGet('/classes?page_size=200');
    var classesData = classesResp.data && classesResp.data.data ? classesResp.data.data
                    : classesResp.data ? classesResp.data
                    : classesResp;
    if (!Array.isArray(classesData)) classesData = [];

    // 按student_id过滤课程
    var studentId = getStudentId();
    if (studentId) {
        classesData = classesData.filter(function(c) {
            return c.student_id === parseInt(studentId);
        });
    }

    // 分类课程
    var today = getLocalDate();
    var todayClasses = classesData.filter(function(c) { return c.date === today && c.status === 'scheduled'; });
    var upcoming = classesData.filter(function(c) { return c.date > today && c.status === 'scheduled'; });
    var past = classesData.filter(function(c) { return c.date < today || c.status !== 'scheduled'; });

    // 排序
    todayClasses.sort(function(a, b) { return (a.start_time || '').localeCompare(b.start_time || ''); });
    upcoming.sort(function(a, b) { return a.date.localeCompare(b.date); });
    past.sort(function(a, b) { return b.date.localeCompare(a.date); });

    renderTodayClasses(todayClasses);
    renderUpcoming(upcoming.slice(0, 10));
    window_allPastClasses = past;
    window_historyPage = 1;
    renderHistory();

  } catch (err) {
    console.error('加载失败:', err);
    alert('加载失败: ' + err.message);
    document.getElementById('today-classes').innerHTML = '<div class="col-span-full text-center py-8 text-red-500">加载失败: ' + err.message + '</div>';
  }
}

// ===== 渲染 Today's Classes =====
function renderTodayClasses(classes) {
 document.getElementById('today-count').textContent = classes.length;
 if (classes.length === 0) {
 document.getElementById('today-classes').innerHTML = '<div class="col-span-full text-center py-8 text-gray-500 bg-white rounded-lg">今日无课程</div>';
 return;
 }
 var html = '';
 for (var i = 0; i < classes.length; i++) {
 var c = classes[i];
 html += '<div class="bg-white rounded-lg shadow p-4">';
 html += '<div class="flex items-center justify-between mb-3">';
 html += '<div class="flex items-center gap-2">';
 html += '<i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>';
 html += '<span class="font-medium">' + formatTime(c.start_time) + ' - ' + formatTime(c.end_time) + '</span>';
 html += '</div>';
 html += '<span class="text-xs px-2 py-1 rounded-full ' + (STATUS_COLORS[c.status] || '') + '">' + (STATUS_LABELS[c.status] || c.status) + '</span>';
 html += '</div>';
 html += '<div class="space-y-1 text-sm">';
 html += '<div class="flex items-center gap-2">';
 html += '<i data-lucide="user" class="w-4 h-4 text-gray-400"></i>';
 html += '<span class="font-medium">' + (c.teacher_name || '未知老师') + '</span>';
 html += '</div>';
 html += '<div class="flex items-center gap-2">';
 html += '<i data-lucide="book-open" class="w-4 h-4 text-gray-400"></i>';
 html += '<span>' + (c.subject || '英语') + '</span>';
 html += '</div>';
// 上课链接/会议信息 - 家长端显示
 if (c.class_link) {
  html += '<div class="mt-3 pt-3 border-t border-gray-100">';
  html += '<label class="block text-xs text-gray-500 mb-1">上课信息</label>';
  html += '<div class="text-sm text-gray-700 bg-blue-50 p-3 rounded whitespace-pre-wrap">' + c.class_link + '</div>';
  html += '</div>';
 }
 html += '</div>';
 html += '</div>';
 }
 document.getElementById('today-classes').innerHTML = html;
 lucide.createIcons();
}

function getDayOfWeek(dateStr) {
  var days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  var d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()];
}

// ===== 渲染 Upcoming =====
function renderUpcoming(classes) {
  if (classes.length === 0) {
    document.getElementById('upcoming-section').classList.add('hidden');
    return;
  }
  document.getElementById('upcoming-count').textContent = classes.length;
  var html = '';
  for (var i = 0; i < classes.length; i++) {
    var c = classes[i];
    html += '<tr>';
    html += '<td class="px-4 py-3 text-sm">' + c.date + ' <span class="text-orange-500 font-medium">' + getDayOfWeek(c.date) + '</span></td>';
    html += '<td class="px-4 py-3 text-sm">' + formatTime(c.start_time) + '</td>';
    html += '<td class="px-4 py-3 text-sm">' + (c.subject || '英语') + '</td>';
    html += '<td class="px-4 py-3 text-sm">' + (c.teacher_name || '未知老师') + '</td>';
    html += '<td class="px-4 py-3"><span class="text-xs px-2 py-1 rounded-full ' + (STATUS_COLORS[c.status] || '') + '">' + (STATUS_LABELS[c.status] || c.status) + '</span></td>';
    html += '</tr>';
  }
  document.getElementById('upcoming-body').innerHTML = html;
  document.getElementById('upcoming-section').classList.remove('hidden');
}

// ===== 渲染 History（分页） =====
function renderHistory() {
  // 设置默认分页大小
  if (typeof window_historyPageSize === "undefined") {
    window_historyPageSize = 20;
  }
  var all = window_allPastClasses || [];
  if (all.length === 0) {
    document.getElementById('history-section').classList.add('hidden');
    return;
  }
  var page = window_historyPage || 1;
  var size = window_historyPageSize || 20;
  var totalPages = Math.ceil(all.length / size);
  if (page > totalPages) page = totalPages;
  if (page < 1) page = 1;
  window_historyPage = page;
  var start = (page - 1) * size;
  var end = start + size;
  var pageData = all.slice(start, end);

  document.getElementById('history-count').textContent = '(' + all.length + ' 条记录)';
  var html = '';
  for (var i = 0; i < pageData.length; i++) {
    var c = pageData[i];
    var globalIdx = start + i;
    html += '<tr class="hover:bg-gray-50">';
    html += '<td class="px-4 py-3 text-sm">' + c.date + '</td>';
    html += '<td class="px-4 py-3 text-sm">' + formatTime(c.start_time) + '</td>';
    html += '<td class="px-4 py-3 text-sm">' + (c.subject || '英语') + '</td>';
    html += '<td class="px-4 py-3 text-sm">' + (c.teacher_name || '未知老师') + '</td>';
    if (c.status !== 'scheduled') {
      html += '<td class="px-4 py-3"><a href="#" onclick="showViewFeedback(' + globalIdx + '); return false;" class="text-blue-600 underline text-sm">查看反馈</a></td>';
    } else {
      html += '<td class="px-4 py-3 text-sm text-gray-400">未提交</td>';
    }
    html += '</tr>';
  }
  document.getElementById('history-body').innerHTML = html;
  document.getElementById('history-section').classList.remove('hidden');

  // 分页导航
  var pagHtml = '<span>' + (start + 1) + '-' + Math.min(end, all.length) + ' / ' + all.length + '</span>';
  pagHtml += '<div class="flex gap-2">';
  pagHtml += '<button onclick="goHistoryPage(1)" class="px-3 py-1 border rounded hover:bg-gray-50 ' + (page === 1 ? 'opacity-50 cursor-not-allowed' : '') + '">First</button>';
  pagHtml += '<button onclick="goHistoryPage(' + (page - 1) + ')" class="px-3 py-1 border rounded hover:bg-gray-50 ' + (page === 1 ? 'opacity-50 cursor-not-allowed' : '') + '">Prev</button>';
  pagHtml += '<button onclick="goHistoryPage(' + (page + 1) + ')" class="px-3 py-1 border rounded hover:bg-gray-50 ' + (page >= totalPages ? 'opacity-50 cursor-not-allowed' : '') + '">Next</button>';
  pagHtml += '<button onclick="goHistoryPage(' + totalPages + ')" class="px-3 py-1 border rounded hover:bg-gray-50 ' + (page >= totalPages ? 'opacity-50 cursor-not-allowed' : '') + '">Last</button>';
  pagHtml += '</div>';
  document.getElementById('history-pagination').innerHTML = pagHtml;
}

function goHistoryPage(page) {
  window_historyPage = page;
  renderHistory();
}

// ===== 查看反馈弹窗 =====
function showViewFeedback(idx) {
  var cls = window_allPastClasses[idx];
  if (!cls) return;
  
  // 填充模态框内容
  document.getElementById('feedback-modal-date').textContent = cls.date || '-';
  document.getElementById('feedback-modal-time').textContent = (cls.start_time ? formatTime(cls.start_time) : '-') + ' - ' + (cls.end_time ? formatTime(cls.end_time) : '-');
  document.getElementById('feedback-modal-teacher').textContent = cls.teacher_name || '-';
  document.getElementById('feedback-modal-subject').textContent = cls.subject || '-';
  document.getElementById('feedback-modal-hours').textContent = (cls.hours || 1) + ' 节';
  document.getElementById('feedback-modal-content').innerHTML = escapeHtml(cls.content) || '无';
  document.getElementById('feedback-modal-homework').innerHTML = escapeHtml(cls.homework) || '无';
  document.getElementById('feedback-modal-notes').innerHTML = escapeHtml(cls.notes) || '无';
  
  // 显示模态框
  document.getElementById('feedback-modal').classList.remove('hidden');
}

function closeFeedbackModal() {
  document.getElementById('feedback-modal').classList.add('hidden');
}



// ===== 初始化 =====
loadStudentData();
lucide.createIcons();
</script>

<!-- 反馈详情模态框 -->
<div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-lg p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <h2 class="text-xl font-bold mb-4 text-gray-800">上课反馈详情</h2>
    
    <!-- 基本信息 -->
    <div class="bg-gray-50 rounded-lg p-3 mb-4">
      <div class="text-sm text-gray-600 space-y-1">
        <div><span class="font-medium">日期：</span><span id="feedback-modal-date">-</span></div>
        <div><span class="font-medium">时间：</span><span id="feedback-modal-time">-</span></div>
        <div><span class="font-medium">老师：</span><span id="feedback-modal-teacher">-</span></div>
        <div><span class="font-medium">科目：</span><span id="feedback-modal-subject">-</span></div>
        <div><span class="font-medium">课时：</span><span id="feedback-modal-hours">-</span></div>
      </div>
    </div>
    
    <!-- 反馈内容 -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">上课内容</label>
        <div id="feedback-modal-content" class="w-full px-3 py-2 border rounded-lg bg-gray-50 text-gray-600 min-h-[60px] whitespace-pre-wrap">-</div>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">作业布置</label>
        <div id="feedback-modal-homework" class="w-full px-3 py-2 border rounded-lg bg-gray-50 text-gray-600 min-h-[40px] whitespace-pre-wrap">-</div>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
        <div id="feedback-modal-notes" class="w-full px-3 py-2 border rounded-lg bg-gray-50 text-gray-600 min-h-[40px] whitespace-pre-wrap">-</div>
      </div>
    </div>
    
    <!-- 关闭按钮 -->
    <div class="mt-6">
      <button
        onclick="closeFeedbackModal()"
        class="w-full px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700"
      >
        关闭
      </button>
    </div>
  </div>
</div>

</body>
</html>
