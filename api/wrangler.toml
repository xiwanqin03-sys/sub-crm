name = "sunnybridge-crm-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "5a225d0bf11ade96374b59a3743dacd0"

# workers.dev 子域名
workers_dev = true

[vars]
API_VERSION = "v1"
DEBUG = "false"
RESEND_API_KEY = "re_7ZfLM9p9_27LogrTCeuFi37jHdPDKhNEV"
# LLM 配置 (OpenAI 兼容)
# 当前用智谱 GLM-4V (视觉模型,能直接读扫描版 PDF 的图片)
# 文字版教材可改用 glm-4.7-flash,扫描版必须用 glm-4v (支持 image_url 多模态输入)
LLM_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
LLM_MODEL = "glm-4v"
# LLM_API_KEY 用 wrangler secret 配置,不放这里

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "sunnybridge-crm"
database_id = "ec11b207-8e7f-4796-9875-45ccb4cb1ef5"

# R2 存储配置 (教材 PDF)
[[r2_buckets]]
binding = "TEXTBOOKS_R2"
bucket_name = "sunnybridge-textbooks"

# 开发环境变量
[env.dev]
vars = { DEBUG = "true" }

# 生产环境
[env.production]
vars = { DEBUG = "false" }
# D1 binding shared from top level (do not duplicate)