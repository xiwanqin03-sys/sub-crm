name = "sunnybridge-crm-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "5a225d0bf11ade96374b59a3743dacd0"

# workers.dev 子域名
workers_dev = true

[vars]
API_VERSION = "v1"
DEBUG = "false"
RESEND_API_KEY = "re_7ZfLM9p9_27LogrTCeuFi37jHdPDKhNEV"
# LLM 配置 (OpenAI 兼容)
# 当前用 NVIDIA NIM 上的 google/gemma-3n-e4b-it (视觉多模态,免费额度,质量高不限流)
# 注意: 用户的 LLM_API_KEY 已改为 NVIDIA NIM 的 key (不是 z.ai)
LLM_BASE_URL = "https://integrate.api.nvidia.com/v1"
LLM_MODEL = "google/gemma-3n-e4b-it"
# LLM_API_KEY 用 wrangler secret 配置 NVIDIA NIM API key

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "sunnybridge-crm"
database_id = "ec11b207-8e7f-4796-9875-45ccb4cb1ef5"

# R2 存储配置 (教材 PDF)
[[r2_buckets]]
binding = "TEXTBOOKS_R2"
bucket_name = "sunnybridge-textbooks"

# 开发环境变量
[env.dev]
vars = { DEBUG = "true" }

# 生产环境
[env.production]
vars = { DEBUG = "false" }
# D1 binding shared from top level (do not duplicate)
